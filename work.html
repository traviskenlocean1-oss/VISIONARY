<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Work — VISIONARY Web Studio</title>
<meta name="description" content="Every project built from scratch. No templates. No shared DNA.">
<link rel="canonical" href="https://visionary.studio/work">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto}
body{background:#000;color:#fff;overflow-x:hidden;font-family:'Inter',sans-serif}

#nebula-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.4}
#cursor-canvas{position:fixed;inset:0;z-index:9999;pointer-events:none}
#page-transition{position:fixed;inset:0;background:#000;z-index:99999;transform:translateX(-100%);pointer-events:none}

/* ══ NAV ══ */
#nav{position:fixed;top:0;left:0;right:0;padding:26px 56px;display:flex;justify-content:space-between;align-items:center;z-index:500;transition:background .4s,backdrop-filter .4s}
#nav.scrolled{background:rgba(0,0,0,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05)}
.nav-logo{font-family:'Playfair Display',Georgia,serif;font-size:17px;color:#fff;text-decoration:none;letter-spacing:.15em;font-weight:700}
.nav-links{display:flex;gap:44px;list-style:none;align-items:center}
.nav-link{font-size:9.5px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;transition:color .3s;position:relative;display:inline-block}
.nav-link::after{content:'';position:absolute;bottom:-5px;left:0;width:0;height:1px;background:linear-gradient(90deg,#7c3aed,#06b6d4);transition:width .35s}
.nav-link:hover{color:#fff}
.nav-link:hover::after{width:100%}
.nav-link.active{color:rgba(255,255,255,.85)}
.nav-link.active::after{width:100%}

/* ══ HERO ══ */
#work-hero{
  position:relative;z-index:10;
  min-height:38vh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding-bottom:60px;padding-top:120px;
  text-align:center;
}
#work-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(56px,9vw,140px);font-weight:900;
  letter-spacing:.06em;line-height:1;color:#fff;
  text-shadow:0 0 12px rgba(124,58,237,.9),0 0 40px rgba(124,58,237,.5),0 0 90px rgba(124,58,237,.22);
  overflow:hidden;
}
#work-title span{display:inline-block}
#work-sub{
  font-size:clamp(10px,1.1vw,13px);letter-spacing:.25em;text-transform:uppercase;
  color:rgba(255,255,255,.28);margin-top:18px;opacity:0;
}

/* ══ PANELS SECTION ══ */
#panels-section{
  position:relative;z-index:10;
  padding:100px 0 80px;
}
#panels-container{
  width:94vw;max-width:1500px;
  margin:0 auto;
  transform-style:preserve-3d;
  /* JS controls perspective-transform */
}
#panels-wrapper{
  display:flex;
  gap:4px;
  align-items:flex-end;
  height:62vh;min-height:400px;max-height:580px;
  overflow:visible;
}

/* ══ PANELS ══ */
.panel{
  position:relative;
  flex:1 1 0;
  min-width:0;
  height:100%;
  border-radius:5px;
  overflow:hidden;
  cursor:pointer;
  transform-origin:bottom center;
  will-change:transform;
  /* Only width/border/box-shadow transition — transform controlled by JS */
  transition:flex .42s cubic-bezier(.34,1.38,.64,1),
             border-color .28s,box-shadow .28s;
  border:1px solid rgba(var(--cr),.32);
  background:linear-gradient(175deg,rgba(var(--cr),.14) 0%,rgba(4,1,14,.98) 35%,rgba(2,0,8,1) 100%);
}
.panel:hover{
  flex:5 1 0;
  border-color:rgba(var(--cr),.85);
  box-shadow:0 0 28px rgba(var(--cr),.32),0 0 55px rgba(var(--cr),.14),inset 0 0 24px rgba(var(--cr),.07);
}

/* Glow line at top edge */
.panel::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(var(--cr),.8),transparent);
  opacity:.55;transition:opacity .3s;
}
.panel:hover::before{opacity:1}

/* Bottom gradient overlay for text legibility */
.panel::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.18) 50%,transparent 100%);
}

/* Index number (subtle, always visible) */
.panel-index{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-size:7px;letter-spacing:.3em;color:rgba(var(--cr),.35);
  z-index:2;transition:opacity .3s;white-space:nowrap;
}
.panel:hover .panel-index{opacity:0}

/* Vertical text — visible on narrow state */
.panel-name-vert{
  position:absolute;
  bottom:32px;left:50%;
  transform:translateX(-50%) rotate(180deg);
  writing-mode:vertical-rl;text-orientation:mixed;
  font-family:'Playfair Display',Georgia,serif;
  font-size:9px;font-weight:700;letter-spacing:.08em;
  color:rgba(255,255,255,.22);
  white-space:nowrap;overflow:hidden;
  text-overflow:clip;max-height:80%;
  z-index:2;transition:opacity .22s;
  pointer-events:none;
}
.panel:hover .panel-name-vert{opacity:0}

/* Content visible only on hover expand */
.panel-content{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 18px 20px;z-index:3;
  opacity:0;transform:translateY(10px);
  transition:opacity .3s .08s,transform .3s .08s;
  pointer-events:none;
}
.panel:hover .panel-content{opacity:1;transform:translateY(0);pointer-events:all}
.panel-tag{
  font-size:6.5px;letter-spacing:.36em;text-transform:uppercase;
  color:rgba(var(--cr),.80);font-variant:small-caps;margin-bottom:6px;
}
.panel-name{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(13px,1.4vw,19px);font-weight:700;color:#fff;
  line-height:1.25;margin-bottom:14px;
}
.panel-live{
  display:inline-block;padding:5px 14px;
  font-size:7px;letter-spacing:.28em;text-transform:uppercase;
  color:rgba(var(--cr),1);
  border:1px solid rgba(var(--cr),.42);border-radius:2px;
  text-decoration:none;background:rgba(var(--cr),.06);
  transition:background .2s,border-color .2s;cursor:pointer;
}
.panel-live:hover{background:rgba(var(--cr),.18);border-color:rgba(var(--cr),.80)}

/* ══ PIXEL SECTION ══ */
#pixel-section{
  position:relative;z-index:10;
  min-height:50vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#pixel-section::before{
  content:'';position:absolute;
  inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(124,58,237,.06) 0%,transparent 70%);
}
#pixel-text{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(28px,5.5vw,88px);font-weight:900;
  letter-spacing:.06em;color:rgba(255,255,255,.78);
  text-align:center;position:relative;z-index:2;
  text-shadow:0 0 24px rgba(124,58,237,.32),0 0 70px rgba(124,58,237,.12);
  opacity:0;
}

/* ══ MOBILE ══ */
@media(max-width:768px){
  #nav{padding:16px 22px}
  .nav-links{display:none}
  #panels-wrapper{display:none}
  #mobile-cards{display:flex!important}
}

/* Mobile fallback cards */
#mobile-cards{
  display:none;flex-direction:column;gap:12px;
  padding:0 20px;
}
.mob-card{
  border:1px solid rgba(var(--cr),.45);border-radius:6px;
  padding:20px;background:rgba(4,1,12,.90);
  cursor:pointer;
}
.mob-card-tag{font-size:7px;letter-spacing:.32em;text-transform:uppercase;color:rgba(var(--cr),.75);margin-bottom:6px;font-variant:small-caps}
.mob-card-name{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:700;color:#fff}
.mob-card-link{display:inline-block;margin-top:12px;font-size:7.5px;letter-spacing:.24em;color:rgba(var(--cr),.85);text-transform:uppercase}
</style>
</head>
<body>

<div id="page-transition"></div>
<canvas id="nebula-canvas"></canvas>

<nav id="nav">
  <a href="index.html" class="nav-logo">VISIONARY</a>
  <ul class="nav-links">
    <li><a href="work.html"     class="nav-link active">Work</a></li>
    <li><a href="about.html"    class="nav-link">About</a></li>
    <li><a href="services.html" class="nav-link">Services</a></li>
    <li><a href="contact.html"  class="nav-link">Contact</a></li>
  </ul>
</nav>

<section id="work-hero">
  <h1 id="work-title">THE WORK</h1>
  <p id="work-sub">Every project built from scratch. No templates. No shared DNA.</p>
</section>

<section id="panels-section">
  <div id="panels-container">
    <div id="panels-wrapper">
      <!-- 22 panels generated by JS -->
    </div>
    <!-- Mobile fallback -->
    <div id="mobile-cards"></div>
  </div>
</section>

<section id="pixel-section">
  <p id="pixel-text">EVERY PIXEL INTENTIONAL.</p>
</section>

<canvas id="cursor-canvas"></canvas>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ── LENIS ── */
let lenis=null;
try{
  lenis=new Lenis({lerp:.08,wheelMultiplier:.85,smoothTouch:false});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(t=>lenis.raf(t*1000));
  gsap.ticker.lagSmoothing(0);
}catch(e){console.warn('[V] Lenis:',e.message)}

/* ── MOUSE ── */
const mouse={x:window.innerWidth/2,y:window.innerHeight/2};
window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});

/* ══════════════════════════════════════════════════════
   NEBULA — same as index.html, canvas opacity:0.4 in CSS
══════════════════════════════════════════════════════ */
const NC=[
  [124,58,237],[167,139,250],[139,92,246],[192,132,252],
  [6,182,212],[34,211,238],[236,72,153],[217,70,239]
];
function flowAngle(x,y,t){
  return(
    Math.sin(x*.0042+t*.28)*2.2+
    Math.cos(y*.0035-x*.0022+t*.22)*1.5+
    Math.sin((x+y)*.0028+t*.17)*.9+
    Math.cos(x*.0018-y*.0030-t*.12)*.6
  );
}
(function initNebula(){
  const c=document.getElementById('nebula-canvas');
  const ctx=c.getContext('2d');
  const TAU=Math.PI*2;
  let W,H,blobs=[],stars=[];
  function resize(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    blobs=Array.from({length:62},()=>({
      x:Math.random()*W,y:Math.random()*H,r:70+Math.random()*140,
      cIdx:Math.floor(Math.random()*NC.length),ph:Math.random()*TAU,
      vx:(Math.random()-.5)*.06,vy:(Math.random()-.5)*.05,
    }));
    stars=Array.from({length:1800},()=>({
      x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
      r:.4+Math.random()*1.8,cIdx:Math.floor(Math.random()*NC.length),
      ph:Math.random()*TAU,ba:.12+Math.random()*.55,spd:.5+Math.random()*.9,
    }));
  }
  resize();window.addEventListener('resize',resize);
  const REPEL=110,REPEL_STR=3.8;
  let t=0;
  (function loop(){
    requestAnimationFrame(loop);ctx.clearRect(0,0,W,H);t+=.008;
    ctx.globalCompositeOperation='screen';
    blobs.forEach(b=>{
      b.x=(b.x+b.vx+W)%W;b.y=(b.y+b.vy+H)%H;
      const alpha=.028+.016*Math.sin(t*.32+b.ph);
      const[rv,gv,bv]=NC[b.cIdx];
      const grd=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      grd.addColorStop(0,`rgba(${rv},${gv},${bv},${alpha.toFixed(3)})`);
      grd.addColorStop(.55,`rgba(${rv},${gv},${bv},${(alpha*.35).toFixed(3)})`);
      grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,TAU);ctx.fill();
    });
    ctx.globalCompositeOperation='source-over';
    stars.forEach(p=>{
      const ang=flowAngle(p.x,p.y,t);
      p.vx+=Math.cos(ang)*p.spd*.016;p.vy+=Math.sin(ang)*p.spd*.016;
      const dx=p.x-mouse.x,dy=p.y-mouse.y,d2=dx*dx+dy*dy;
      if(d2<REPEL*REPEL&&d2>.01){const d=Math.sqrt(d2),f=(REPEL-d)/REPEL;p.vx+=(dx/d)*f*REPEL_STR*.12;p.vy+=(dy/d)*f*REPEL_STR*.12}
      p.vx*=.95;p.vy*=.95;p.x=(p.x+p.vx+W)%W;p.y=(p.y+p.vy+H)%H;
      const tw=p.ba*(.55+.45*Math.sin(t*1.4+p.ph));
      const[rv,gv,bv]=NC[p.cIdx];
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*5.5,0,TAU);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${(tw*.022).toFixed(3)})`;ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${Math.min(tw,.96).toFixed(3)})`;ctx.fill();
    });
  })();
})();

/* ══════════════════════════════════════════════════════
   PROJECTS
══════════════════════════════════════════════════════ */
const PROJECTS=[
  {name:'Apex Construction',    tag:'Contractors',   color:'#C9A84C',rgb:'201,168,76',  url:'https://effervescent-puppy-4b3695.netlify.app'},
  {name:'KŌSAI Miami',         tag:'Restaurant',    color:'#dc2626',rgb:'220,38,38',   url:'https://restaurant-chi-two-55.vercel.app'},
  {name:'Solène Atelier',      tag:'Beauty',        color:'#f472b6',rgb:'244,114,182', url:'https://beauty.traviskenlocean1.workers.dev'},
  {name:'Nova Black',           tag:'Automotive',    color:'#a855f7',rgb:'168,85,247',  url:'https://nova-black-murex.vercel.app'},
  {name:'Summit Roofing Co',    tag:'Contractors',   color:'#ea580c',rgb:'234,88,12',   url:'https://profound-puppy-6dab0b.netlify.app'},
  {name:'Lala Sweets',          tag:'Food & Sweets', color:'#eab308',rgb:'234,179,8',   url:'https://lalasweets.vercel.app'},
  {name:'Arctic Air & Plumbing',tag:'HVAC',          color:'#06b6d4',rgb:'6,182,212',   url:'https://hvac-plumbing-demo.vercel.app'},
];

/* 22 panels cycling through 7 projects */
const N=22;
const panelData=Array.from({length:N},(_,i)=>PROJECTS[i%PROJECTS.length]);

/* ══ BUILD PANELS ══ */
(function buildPanels(){
  const wrapper=document.getElementById('panels-wrapper');
  const mobileCards=document.getElementById('mobile-cards');

  panelData.forEach((proj,i)=>{
    /* Desktop panel */
    const panel=document.createElement('div');
    panel.className='panel';
    panel.style.cssText=`--cr:${proj.rgb}`;
    panel.dataset.url=proj.url;
    panel.innerHTML=`
      <span class="panel-index">${String(i+1).padStart(2,'0')}</span>
      <span class="panel-name-vert">${proj.name}</span>
      <div class="panel-content">
        <div class="panel-tag">${proj.tag}</div>
        <div class="panel-name">${proj.name}</div>
        <span class="panel-live">View Live ↗</span>
      </div>`;
    panel.addEventListener('click',()=>window.open(proj.url,'_blank','noopener'));
    wrapper.appendChild(panel);
  });

  /* Mobile fallback — show unique 7 projects only */
  PROJECTS.forEach(proj=>{
    const card=document.createElement('div');
    card.className='mob-card';
    card.style.cssText=`--cr:${proj.rgb}`;
    card.innerHTML=`
      <div class="mob-card-tag">${proj.tag}</div>
      <div class="mob-card-name">${proj.name}</div>
      <span class="mob-card-link">View Live ↗</span>`;
    card.addEventListener('click',()=>window.open(proj.url,'_blank','noopener'));
    mobileCards.appendChild(card);
  });
})();

/* ══════════════════════════════════════════════════════
   SPRING PHYSICS WAVE
   Each panel has its own spring state.
   Gaussian influence decays with horizontal distance
   from cursor to panel center.
══════════════════════════════════════════════════════ */
(function initSpring(){
  const panelEls=Array.from(document.querySelectorAll('.panel'));
  const container=document.getElementById('panels-container');

  /* Spring state per panel */
  const state=panelEls.map(()=>({y:0,vy:0}));

  const SPRING_K  = 0.055;  // spring stiffness
  const DAMPING   = 0.76;   // velocity damping (0=instant, 1=no damping)
  const MAX_LIFT  = 88;     // max upward lift in px
  const SIGMA     = 190;    // Gaussian spread in px

  /* Container 3D rotation state */
  let rotX=0,rotY=0;

  /* Only run when mouse is over panels section */
  const section=document.getElementById('panels-section');
  let inSection=false;
  section.addEventListener('mouseenter',()=>{inSection=true});
  section.addEventListener('mouseleave',()=>{inSection=false});

  (function tick(){
    requestAnimationFrame(tick);

    /* ── Read panel centers (after any width transitions) ── */
    const centers=panelEls.map(el=>{
      const r=el.getBoundingClientRect();
      return r.left+r.width*.5;
    });

    /* ── Compute + integrate spring ── */
    const mx=mouse.x;
    panelEls.forEach((el,i)=>{
      const dx=centers[i]-mx;
      const influence=Math.exp(-dx*dx/(2*SIGMA*SIGMA));
      const targetY=inSection?-influence*MAX_LIFT:0;
      const dy=targetY-state[i].y;
      state[i].vy=state[i].vy*DAMPING+dy*SPRING_K;
      state[i].y+=state[i].vy;
    });

    /* ── Write transforms ── */
    panelEls.forEach((el,i)=>{
      const y=state[i].y;
      /* scaleY very subtly compresses the bottom of lifted panels for realism */
      const scaleY=1+Math.abs(y/MAX_LIFT)*0.04;
      el.style.transform=`translateY(${y.toFixed(2)}px) scaleY(${scaleY.toFixed(4)})`;
    });

    /* ── Container 3D rotation follows cursor (smooth lerp) ── */
    const targetRotX=(mouse.y/window.innerHeight-.5)*-5.5;
    const targetRotY=(mouse.x/window.innerWidth-.5)*9;
    rotX+=(targetRotX-rotX)*.055;
    rotY+=(targetRotY-rotY)*.055;
    container.style.transform=
      `perspective(1300px) rotateX(${rotX.toFixed(3)}deg) rotateY(${rotY.toFixed(3)}deg)`;
  })();
})();

/* ══ HERO TITLE SPLIT + ANIMATE ══ */
(function animateHero(){
  const title=document.getElementById('work-title');
  const sub  =document.getElementById('work-sub');
  const text =title.textContent;

  /* Wrap each character in a span for stagger */
  title.innerHTML=text.split('').map(ch=>
    `<span style="display:inline-block;overflow:hidden"><span style="display:inline-block">${ch===' '?'&nbsp;':ch}</span></span>`
  ).join('');

  const innerChars=title.querySelectorAll('span > span');

  gsap.from(innerChars,{
    y:'105%',
    duration:.75,
    stagger:.055,
    ease:'power3.out',
    delay:.25,
  });

  gsap.to(sub,{opacity:1,y:0,duration:.8,ease:'power2.out',delay:.9});

  /* "EVERY PIXEL INTENTIONAL." scroll reveal */
  ScrollTrigger.create({
    trigger:'#pixel-section',
    start:'top 72%',
    onEnter(){
      gsap.to('#pixel-text',{opacity:1,y:0,duration:1.2,ease:'power3.out'});
    }
  });
})();

/* ══ CURSOR STARDUST ══ */
(function initCursorTrail(){
  const c=document.getElementById('cursor-canvas');
  const ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const pool=[];
  let lx=-9999,ly=-9999;
  window.addEventListener('mousemove',e=>{
    if(Math.hypot(e.clientX-lx,e.clientY-ly)<4)return;
    lx=e.clientX;ly=e.clientY;
    for(let i=0;i<2+(Math.random()<.36?1:0);i++){
      const ang=Math.random()*Math.PI*2,spd=.32+Math.random()*.88;
      pool.push({x:lx,y:ly,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-.22,life:1,dec:1/(42+Math.random()*18),sz:2+Math.random()*2.2,rot:Math.random()*Math.PI,hue:260+Math.random()*80});
    }
  });
  function drawSparkle(x,y,sz,rot,alpha,hue){
    ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.globalAlpha=alpha;ctx.fillStyle=`hsl(${hue},100%,88%)`;
    ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(sz*.13,0);ctx.lineTo(0,sz);ctx.lineTo(-sz*.13,0);ctx.closePath();ctx.fill();
    ctx.rotate(Math.PI*.5);
    ctx.beginPath();ctx.moveTo(0,-sz*.55);ctx.lineTo(sz*.085,0);ctx.lineTo(0,sz*.55);ctx.lineTo(-sz*.085,0);ctx.closePath();ctx.fill();
    ctx.restore();
  }
  (function loop(){
    requestAnimationFrame(loop);ctx.clearRect(0,0,c.width,c.height);
    for(let i=pool.length-1;i>=0;i--){
      const s=pool[i];
      s.x+=s.vx;s.y+=s.vy;s.vx*=.97;s.vy*=.97;s.life-=s.dec;s.rot+=.042;
      if(s.life<=0){pool.splice(i,1);continue}
      drawSparkle(s.x,s.y,s.sz,s.rot,s.life*s.life,s.hue);
    }
  })();
})();

/* ══ NAV ══ */
window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('scrolled',window.scrollY>60);
},{passive:true});

/* ══ PAGE TRANSITIONS ══ */
gsap.set('#page-transition',{x:'100%'});
document.querySelectorAll('a[href]').forEach(a=>{
  const hr=a.getAttribute('href');
  if(!hr||hr.startsWith('#')||hr.startsWith('mailto')||hr.startsWith('tel')||hr.startsWith('http'))return;
  a.addEventListener('click',e=>{
    e.preventDefault();
    gsap.fromTo('#page-transition',{x:'100%'},{x:'0%',duration:.5,ease:'power3.inOut',onComplete:()=>window.location.href=hr});
  });
});
window.addEventListener('load',()=>{
  gsap.fromTo('#page-transition',{x:'0%'},{x:'-100%',duration:.6,delay:.1,ease:'power3.inOut'});
});
</script>
</body>
</html>
