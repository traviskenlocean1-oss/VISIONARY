<script>
gsap.registerPlugin(ScrollTrigger);

/* ── LENIS ── */
let lenis = null;
try {
  lenis = new Lenis({ lerp:0.08, wheelMultiplier:0.85, smoothTouch:false });
  lenis.on('scroll', ScrollTrigger.update);
  gsap.ticker.add(t => lenis.raf(t * 1000));
  gsap.ticker.lagSmoothing(0);
} catch(e) { console.warn('[V] Lenis:', e.message); }

/* ── MOUSE ── */
const mouse = { x:-9999, y:-9999 };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

/* ══════════════════════════════════════════════════════
   TREE — Cyberpunk bioluminescent ancient tree
   Branch format: { p0, cp, p1, d }
     d=0  trunk (thick, dark purple, gnarled)
     d=1  main branches
     d=2  secondary branches
     d=3  tips (project card anchors)
   All coords are [xFrac, yFrac], y=0=top, y=1=bottom.
══════════════════════════════════════════════════════ */
const BRANCHES = [
  // ── Trunk — two segments, grows from y=1 to y=0.656 ──
  { p0:[0.500,1.000], cp:[0.494,0.888], p1:[0.500,0.778], d:0 },
  { p0:[0.500,0.778], cp:[0.506,0.716], p1:[0.500,0.656], d:0 },

  // ── Main fork at y≈0.656 — wide dramatic spread ──
  { p0:[0.500,0.656], cp:[0.322,0.586], p1:[0.174,0.514], d:1 },  // far-left
  { p0:[0.500,0.656], cp:[0.500,0.584], p1:[0.500,0.514], d:1 },  // center continues
  { p0:[0.500,0.656], cp:[0.678,0.586], p1:[0.826,0.514], d:1 },  // far-right

  // ── Center upper limb ──
  { p0:[0.500,0.514], cp:[0.497,0.456], p1:[0.498,0.396], d:1 },

  // ── Secondary from far-left (0.174, 0.514) ──
  { p0:[0.174,0.514], cp:[0.080,0.438], p1:[0.048,0.356], d:2 },  // L-outer
  { p0:[0.174,0.514], cp:[0.222,0.436], p1:[0.290,0.354], d:2 },  // L-inner

  // ── Secondary from center-upper (0.498, 0.396) ──
  { p0:[0.498,0.396], cp:[0.420,0.352], p1:[0.356,0.328], d:2 },  // C-left
  { p0:[0.498,0.396], cp:[0.498,0.350], p1:[0.498,0.322], d:2 },  // C-center
  { p0:[0.498,0.396], cp:[0.576,0.352], p1:[0.640,0.328], d:2 },  // C-right

  // ── Secondary from far-right (0.826, 0.514) ──
  { p0:[0.826,0.514], cp:[0.778,0.436], p1:[0.710,0.354], d:2 },  // R-inner
  { p0:[0.826,0.514], cp:[0.920,0.438], p1:[0.952,0.356], d:2 },  // R-outer

  // ── Tips (d=3) — 7 project cards ──
  { p0:[0.048,0.356], cp:[0.030,0.332], p1:[0.042,0.308], d:3 },  // 0 Apex Construction
  { p0:[0.290,0.354], cp:[0.272,0.330], p1:[0.260,0.308], d:3 },  // 1 KŌSAI Miami
  { p0:[0.356,0.328], cp:[0.342,0.316], p1:[0.349,0.304], d:3 },  // 2 Solène Atelier
  { p0:[0.498,0.322], cp:[0.498,0.312], p1:[0.498,0.302], d:3 },  // 3 Nova Black
  { p0:[0.640,0.328], cp:[0.654,0.316], p1:[0.647,0.304], d:3 },  // 4 Summit Roofing
  { p0:[0.710,0.354], cp:[0.728,0.330], p1:[0.740,0.308], d:3 },  // 5 Lala Sweets
  { p0:[0.952,0.356], cp:[0.970,0.332], p1:[0.958,0.308], d:3 },  // 6 Arctic Air
];

const TIP_POINTS = BRANCHES.filter(b => b.d === 3).map(b => b.p1);

const PROJECTS = [
  { name:'Apex Construction',     vertical:'Contractors',   url:'https://effervescent-puppy-4b3695.netlify.app' },
  { name:'KŌSAI Miami',          vertical:'Restaurant',    url:'https://restaurant-chi-two-55.vercel.app' },
  { name:'Solène Atelier',       vertical:'Beauty',        url:'https://beauty.traviskenlocean1.workers.dev' },
  { name:'Nova Black',            vertical:'Automotive',    url:'https://nova-black-murex.vercel.app' },
  { name:'Summit Roofing Co',     vertical:'Contractors',   url:'https://profound-puppy-6dab0b.netlify.app' },
  { name:'Lala Sweets',           vertical:'Food & Sweets', url:'https://lalasweets.vercel.app' },
  { name:'Arctic Air & Plumbing', vertical:'HVAC',          url:'https://hvac-plumbing-demo.vercel.app' },
];

/* ── Branch color gradient: dark-purple → violet → violet → cyan ── */
const BCLR = [[18,0,42],[88,28,190],[124,58,237],[6,182,212]];
function treeRGB(cd, tw) {
  const s = Math.min(cd, 0.9999)*3;
  const i = Math.floor(s), f = s-i;
  const a = BCLR[i], b = BCLR[i+1];
  return [
    Math.round((a[0]+(b[0]-a[0])*f)*tw),
    Math.round((a[1]+(b[1]-a[1])*f)*tw),
    Math.round((a[2]+(b[2]-a[2])*f)*tw),
  ];
}

/* ── Orb colors: cyan, orange, red-pink, mint, purple, gold ── */
const ORB_CLR = [
  [0,255,255],[255,107,0],[255,34,100],[0,255,140],[191,95,255],[255,215,0]
];

/* ── Quadratic bezier ── */
function bpt(t, p0, cp, p1) {
  const m = 1-t;
  return [m*m*p0[0]+2*m*t*cp[0]+t*t*p1[0], m*m*p0[1]+2*m*t*cp[1]+t*t*p1[1]];
}

/* ══ STAR CANVAS ══ */
(function initStars(){
  const c = document.getElementById('star-canvas');
  const ctx = c.getContext('2d');
  let stars=[], sparks=[];
  function resize(){
    c.width=window.innerWidth; c.height=window.innerHeight;
    stars = Array.from({length:260},()=>({
      x:Math.random()*c.width, y:Math.random()*c.height,
      r:0.2+Math.random()*1.0, a:0.05+Math.random()*0.38,
      vx:(Math.random()-.5)*.045, vy:(Math.random()-.5)*.045,
      ph:Math.random()*Math.PI*2,
    }));
    /* Larger bright star-sparks concentrated in tree zone */
    sparks = Array.from({length:38},()=>({
      x: c.width*0.1+Math.random()*c.width*0.8,
      y: c.height*0.2+Math.random()*c.height*0.7,
      r: 0.9+Math.random()*2.4, a:0.35+Math.random()*0.55,
      vx:(Math.random()-.5)*.038, vy:(Math.random()-.5)*.038,
      ph:Math.random()*Math.PI*2,
    }));
  }
  resize(); window.addEventListener('resize',resize);
  let t=0;
  (function loop(){
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,c.width,c.height); t+=.007;
    /* Regular stars */
    stars.forEach(s=>{
      s.x=(s.x+s.vx+c.width)%c.width;
      s.y=(s.y+s.vy+c.height)%c.height;
      const tw=s.a*(.55+.45*Math.sin(t*1.6+s.ph));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${tw.toFixed(3)})`; ctx.fill();
    });
    /* Bright 4-pointed sparks */
    sparks.forEach(s=>{
      s.x=(s.x+s.vx+c.width)%c.width;
      s.y=(s.y+s.vy+c.height)%c.height;
      const tw=s.a*(.45+.55*Math.sin(t*1.1+s.ph));
      ctx.save(); ctx.translate(s.x,s.y); ctx.globalAlpha=tw;
      /* vertical spike */
      ctx.fillStyle='rgba(220,200,255,1)';
      ctx.beginPath(); ctx.moveTo(0,-s.r*2.4); ctx.lineTo(s.r*.14,0); ctx.lineTo(0,s.r*2.4); ctx.lineTo(-s.r*.14,0); ctx.closePath(); ctx.fill();
      /* horizontal spike */
      ctx.rotate(Math.PI*.5);
      ctx.beginPath(); ctx.moveTo(0,-s.r*1.4); ctx.lineTo(s.r*.10,0); ctx.lineTo(0,s.r*1.4); ctx.lineTo(-s.r*.10,0); ctx.closePath(); ctx.fill();
      ctx.restore();
    });
  })();
})();

/* ══ PARTICLE TREE ══ */
let treeParticles=[], glowOrbs=[], embers=[];

/* Density and radius multipliers per depth */
const DENS   = [3.4, 2.2, 1.8, 1.4];
const R_MUL  = [2.8, 1.8, 1.2, 0.85];

function buildParticles(){
  const W=window.innerWidth, H=window.innerHeight;
  const TAU=Math.PI*2;
  treeParticles=[]; glowOrbs=[];

  BRANCHES.forEach(br=>{
    const p0=[br.p0[0]*W, br.p0[1]*H];
    const cp=[br.cp[0]*W, br.cp[1]*H];
    const p1=[br.p1[0]*W, br.p1[1]*H];
    /* Arc-length estimate via 24-point sampling */
    let len=0, prev=p0.slice();
    for(let k=1;k<=24;k++){
      const pt=bpt(k/24,p0,cp,p1);
      len+=Math.hypot(pt[0]-prev[0],pt[1]-prev[1]);
      prev=pt;
    }
    const cnt=Math.max(4,Math.floor(len*DENS[br.d]));
    const rMul=R_MUL[br.d];
    /* Lateral scatter makes trunk look thick and gnarled */
    const scMax = br.d===0 ? 20 : br.d===1 ? 9 : 0;

    for(let i=0;i<cnt;i++){
      const t2=i/cnt;
      const [bx,by]=bpt(t2,p0,cp,p1);
      const cd=(br.d+t2)/3.0;
      const scatter=(Math.random()-.5)*scMax;
      treeParticles.push({
        bx:bx+scatter, by,
        x:0, y:0, vx:0, vy:0,
        ph:Math.random()*TAU, ph2:Math.random()*TAU,
        r:(0.65+Math.random()*2.0)*rMul,
        cd, br:0.38+Math.random()*0.62,
        depth:br.d,
      });
    }
  });

  /* ── Glow Orbs — placed at every non-trunk branch endpoint and fork ── */
  const orbAnchors=[];
  BRANCHES.forEach(br=>{
    if(br.d>=1) orbAnchors.push({x:br.p1[0],y:br.p1[1],d:br.d});
    /* Also at the main fork point itself */
    if(br.d===1) orbAnchors.push({x:br.p0[0],y:br.p0[1],d:0.5});
  });

  orbAnchors.forEach(anch=>{
    const n = anch.d===3 ? 5+Math.floor(Math.random()*4)
             : anch.d>=2  ? 3+Math.floor(Math.random()*3)
             :               2+Math.floor(Math.random()*2);
    for(let i=0;i<n;i++){
      const baseR = anch.d===3 ? 3.5 : anch.d>=2 ? 2.5 : 1.8;
      glowOrbs.push({
        bx:anch.x*W, by:anch.y*H,
        orbitR:  8+Math.random()*26,
        orbitPh: Math.random()*TAU,
        orbitSpd:(0.06+Math.random()*0.18)*(Math.random()<.5?1:-1),
        r: baseR+Math.random()*3.8,
        cIdx: Math.floor(Math.random()*ORB_CLR.length),
        pulsePh: Math.random()*TAU,
        pulseSpd:0.42+Math.random()*0.88,
        depth:anch.d,
      });
    }
  });
}

/* ══ TREE CANVAS ANIMATION ══ */
(function initTree(){
  const c   = document.getElementById('tree-canvas');
  const ctx = c.getContext('2d');
  const REPEL=95, STR=6.0;
  const TAU=Math.PI*2;

  function resize(){
    c.width=window.innerWidth; c.height=window.innerHeight;
    embers.length=0;
    buildParticles(); positionCards();
  }
  resize(); window.addEventListener('resize',resize);

  let t=0;
  (function loop(){
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,c.width,c.height);
    t+=0.011;
    const mx=mouse.x, my=mouse.y;
    const W=c.width, H=c.height;

    /* ── 1. Ground glow at trunk base ── */
    const gg=ctx.createRadialGradient(W*.5,H*.99,0,W*.5,H*.99,W*.42);
    gg.addColorStop(0,'rgba(0,180,255,0.11)');
    gg.addColorStop(0.40,'rgba(80,0,200,0.058)');
    gg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gg; ctx.fillRect(0,H*.62,W,H*.38);

    /* Mist band */
    const mg=ctx.createLinearGradient(0,H*.72,0,H);
    mg.addColorStop(0,'rgba(0,40,90,0)');
    mg.addColorStop(1,'rgba(0,22,55,0.14)');
    ctx.fillStyle=mg; ctx.fillRect(0,H*.72,W,H*.28);

    /* ── 2. Global tree sway — tips move more than trunk ── */
    const gsw=Math.sin(t*0.21)*4.2;

    /* ── 3. Branch particles ── */
    treeParticles.forEach(p=>{
      const swX=Math.sin(t*.27+p.ph*.52)*(2.4+5.0*p.cd)+gsw*(0.28+p.cd*0.72);
      const swY=Math.cos(t*.17+p.ph2*.36)*1.3;
      const px=p.bx+swX, py=p.by+swY;

      /* Mouse repulsion */
      const dx=px-mx, dy=py-my, d2=dx*dx+dy*dy;
      if(d2<REPEL*REPEL&&d2>0.01){
        const d=Math.sqrt(d2), f=(REPEL-d)/REPEL;
        p.vx+=(dx/d)*f*STR*.10; p.vy+=(dy/d)*f*STR*.10;
      }
      p.vx*=.88; p.vy*=.88;
      p.x=px+p.vx; p.y=py+p.vy;

      const tw=p.br*(.43+.57*Math.sin(t*2.0+p.ph));
      const [rv,gv,bv]=treeRGB(p.cd,tw);
      const av=Math.min(tw,.95);

      /* Glow halo */
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*2.8,0,TAU);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},0.050)`; ctx.fill();
      /* Core */
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,TAU);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${av.toFixed(3)})`; ctx.fill();
    });

    /* ── 4. Glow Orbs — spherical bioluminescent clusters ── */
    glowOrbs.forEach(orb=>{
      orb.orbitPh+=orb.orbitSpd*0.011;
      const ox=Math.cos(orb.orbitPh)*orb.orbitR;
      const oy=Math.sin(orb.orbitPh)*orb.orbitR*0.50;
      const swayF=orb.depth>=2 ? 0.72 : 0.42;
      const px=orb.bx+ox+gsw*swayF;
      const py=orb.by+oy;

      const pulse=0.52+0.48*Math.sin(t*orb.pulseSpd+orb.pulsePh);
      const [rv,gv,bv]=ORB_CLR[orb.cIdx];

      /* Outer bloom */
      ctx.beginPath(); ctx.arc(px,py,orb.r*8.5,0,TAU);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${(pulse*0.018).toFixed(3)})`; ctx.fill();
      /* Mid glow */
      ctx.beginPath(); ctx.arc(px,py,orb.r*3.5,0,TAU);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${(pulse*0.092).toFixed(3)})`; ctx.fill();
      /* Core sphere */
      ctx.beginPath(); ctx.arc(px,py,orb.r,0,TAU);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${(pulse*0.90).toFixed(3)})`; ctx.fill();
      /* Specular highlight */
      ctx.beginPath(); ctx.arc(px-orb.r*.30,py-orb.r*.30,orb.r*.34,0,TAU);
      ctx.fillStyle=`rgba(255,255,255,${(pulse*0.60).toFixed(3)})`; ctx.fill();
    });

    /* ── 5. Embers — rising particles from branch tips ── */
    for(let i=embers.length-1;i>=0;i--){
      const em=embers[i];
      em.x+=em.vx+Math.sin(t*3.0+i*0.42)*0.30;
      em.y+=em.vy;
      em.vy*=0.991;
      em.life-=em.dec;
      if(em.life<=0){embers.splice(i,1);continue;}
      const al=em.life*em.life;
      const [rv,gv,bv]=em.gold?[255,215,0]:[0,218,255];
      /* Soft bloom */
      ctx.beginPath(); ctx.arc(em.x,em.y,em.r*2.8,0,TAU);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${(al*0.14).toFixed(3)})`; ctx.fill();
      /* Core */
      ctx.beginPath(); ctx.arc(em.x,em.y,em.r,0,TAU);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${al.toFixed(3)})`; ctx.fill();
    }

    /* Spawn ~24 embers/sec */
    if(Math.random()<0.40){
      const tp=TIP_POINTS[Math.floor(Math.random()*TIP_POINTS.length)];
      embers.push({
        x:tp[0]*W+(Math.random()-.5)*24,
        y:tp[1]*H+(Math.random()-.5)*10,
        vx:(Math.random()-.5)*0.68,
        vy:-(0.42+Math.random()*1.05),
        life:1.0, dec:0.005+Math.random()*0.007,
        r:0.65+Math.random()*1.40,
        gold:Math.random()<0.55,
      });
    }

    /* ── 6. Fireflies — atmospheric drift near branches ── */
    /* (handled by glowOrbs with wide orbits — no separate system needed) */

  })();
})();

/* ══ PROJECT CARDS ══ */
function positionCards(){
  const layer=document.getElementById('cards-layer');
  const W=window.innerWidth, H=window.innerHeight;

  if(layer.children.length===0){
    PROJECTS.forEach((proj,i)=>{
      const card=document.createElement('div');
      card.className='proj-card';
      card.innerHTML=
        `<div class="pc-vertical">${proj.vertical}</div>`+
        `<div class="pc-name">${proj.name}</div>`+
        `<div class="pc-view">View Live ↗</div>`;
      card.addEventListener('click',()=>window.open(proj.url,'_blank','noopener'));
      layer.appendChild(card);
    });
    gsap.to('.proj-card',{
      opacity:1, duration:.7,
      stagger:{each:.09,from:'random'},
      ease:'power2.out', delay:3.8,
    });
  }

  const HW=50;
  Array.from(layer.children).forEach((card,i)=>{
    const tp=TIP_POINTS[i];
    const px=Math.max(HW,Math.min(W-HW,tp[0]*W));
    const py=tp[1]*H;
    card.style.left=px+'px';
    card.style.top =py+'px';
  });
}

/* ══ CURSOR STARDUST ══ */
(function initCursorTrail(){
  const c=document.getElementById('cursor-canvas');
  const ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  const pool=[];
  let lx=-9999,ly=-9999;
  window.addEventListener('mousemove',e=>{
    if(Math.hypot(e.clientX-lx,e.clientY-ly)<4)return;
    lx=e.clientX; ly=e.clientY;
    const n=2+(Math.random()<.36?1:0);
    for(let i=0;i<n;i++){
      const ang=Math.random()*Math.PI*2, spd=.32+Math.random()*.88;
      pool.push({
        x:lx,y:ly, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-.22,
        life:1.0, dec:1/(42+Math.random()*18),
        sz:2.0+Math.random()*2.2, rot:Math.random()*Math.PI,
        hue:46+Math.random()*18,
      });
    }
  });
  function drawSparkle(x,y,sz,rot,alpha,hue){
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.globalAlpha=alpha;
    ctx.fillStyle=`hsl(${hue},100%,93%)`;
    ctx.beginPath(); ctx.moveTo(0,-sz); ctx.lineTo(sz*.13,0); ctx.lineTo(0,sz); ctx.lineTo(-sz*.13,0); ctx.closePath(); ctx.fill();
    ctx.rotate(Math.PI*.5);
    ctx.beginPath(); ctx.moveTo(0,-sz*.55); ctx.lineTo(sz*.085,0); ctx.lineTo(0,sz*.55); ctx.lineTo(-sz*.085,0); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  (function loop(){
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=pool.length-1;i>=0;i--){
      const s=pool[i];
      s.x+=s.vx; s.y+=s.vy; s.vx*=.97; s.vy*=.97;
      s.life-=s.dec; s.rot+=.042;
      if(s.life<=0){pool.splice(i,1);continue;}
      drawSparkle(s.x,s.y,s.sz,s.rot,s.life*s.life,s.hue);
    }
  })();
})();

  gsap.timeline({ delay:1.5 })
    .to('#book-logo',  { opacity:0, duration:.40, ease:'power2.in' })

/* ══ HERO REVEAL ══ */
gsap.set(['#hero-text','#hero-ctas','.scroll-indicator'], { opacity:0 });

function startHeroReveal(){

    .to('#hero-ctas',        { opacity:1,      duration:.9,  ease:'power2.out' }, '-=.4')

/* ══ NAV + PAGE TRANSITIONS ══ */
window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('scrolled',window.scrollY>60);
},{passive:true});

gsap.set('#page-transition',{x:'100%'});
document.querySelectorAll('a[href]').forEach(a=>{
  const hr=a.getAttribute('href');
  if(!hr||hr.startsWith('#')||hr.startsWith('mailto')||hr.startsWith('tel')||hr.startsWith('http'))return;
  a.addEventListener('click',e=>{
    e.preventDefault();
    gsap.fromTo('#page-transition',{x:'100%'},{
      x:'0%',duration:.5,ease:'power3.inOut',
      onComplete:()=>window.location.href=hr,
    });
  });
});
window.addEventListener('load',()=>{
  gsap.fromTo('#page-transition',{x:'0%'},{x:'-100%',duration:.6,delay:.1,ease:'power3.inOut'});
});
