<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto}
body{background:#000;color:#fff;overflow-x:hidden;cursor:none;font-family:'Inter',sans-serif}
a{cursor:none}

/* ── CANVASES ── */
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#cursor-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9998;pointer-events:none}

/* ── CURSOR ── */
#cursor-sphere{
  position:fixed;width:18px;height:18px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff 0%,#00e5ff 45%,#8b00ff 100%);
  box-shadow:0 0 16px #00e5ff,0 0 32px #8b00ff,0 0 60px rgba(139,0,255,0.35);
  transform:translate(-50%,-50%);pointer-events:none;z-index:9999;
  mix-blend-mode:screen;will-change:left,top;
}

/* ── PAGE TRANSITION ── */
#page-transition{position:fixed;inset:0;background:#000;z-index:99999;transform:translateX(-100%);pointer-events:none}

/* ── HERO LOGO OVERLAY ── */
#hero-logo-wrap{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:90;pointer-events:none;
}
#hero-logo{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(72px,13vw,210px);
  font-weight:900;color:#fff;letter-spacing:0.05em;
  white-space:nowrap;perspective:900px;will-change:transform;
}
.h-char{
  display:inline-block;transform-style:preserve-3d;
  transform-origin:center center;will-change:transform,opacity;
}

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;padding:28px 56px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:1000;transition:background .5s,backdrop-filter .5s;
}
#nav.scrolled{
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
#nav-logo{
  font-family:'Playfair Display',Georgia,serif;font-size:20px;
  color:#fff;text-decoration:none;letter-spacing:0.12em;font-weight:700;
  opacity:0; /* hidden until logo FLIP completes */
}
.nav-links{display:flex;gap:48px;list-style:none;align-items:center}
.nav-link{
  font-size:10px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(255,255,255,0.65);text-decoration:none;
  transition:color .3s;position:relative;display:inline-block;
}
.nav-link::after{
  content:'';position:absolute;bottom:-5px;left:0;
  width:0;height:1px;
  background:linear-gradient(90deg,#8b00ff,#00e5ff);
  transition:width .35s ease;
}
.nav-link:hover{color:#fff}
.nav-link:hover::after{width:100%}

/* ── HERO ── */
#hero{
  position:relative;height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:1;
}
.hero-content{text-align:center;position:relative;z-index:2;opacity:0}
.tagline{
  font-size:clamp(9px,1.1vw,12px);letter-spacing:0.35em;text-transform:uppercase;
  color:rgba(255,255,255,0.5);margin-top:24px;
}
.hero-ctas{display:flex;gap:20px;justify-content:center;margin-top:52px}
.btn{
  display:inline-block;padding:15px 44px;
  font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;
  text-decoration:none;color:#fff;border:1px solid rgba(255,255,255,0.7);
  background:transparent;position:relative;overflow:hidden;
  transition:border-color .3s,color .3s;will-change:transform;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(139,0,255,.15),rgba(0,229,255,.15));
  opacity:0;transition:opacity .3s;
}
.btn:hover::before{opacity:1}
.btn:hover{border-color:rgba(0,229,255,.8);color:#00e5ff}
.btn-outline{border-color:rgba(0,229,255,.4);color:rgba(0,229,255,.85)}
.btn-outline:hover{border-color:#00e5ff;color:#fff}

.scroll-indicator{
  position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  z-index:2;opacity:0;
}
.scroll-indicator span{font-size:8px;letter-spacing:.35em;color:rgba(255,255,255,.35)}
.scroll-line{
  width:1px;height:56px;
  background:linear-gradient(to bottom,rgba(139,0,255,.8),transparent);
  animation:scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse{
  0%{transform:scaleY(0);transform-origin:top;opacity:1}
  50%{transform:scaleY(1);transform-origin:top;opacity:1}
  100%{transform:scaleY(1);transform-origin:bottom;opacity:0}
}

/* ── PROJECTS ── */
#projects-section{position:relative;z-index:1}
#projects-pin{overflow:hidden}
#projects-track{
  display:flex;gap:36px;padding:0 88px;
  align-items:center;height:100vh;will-change:transform;
}
.project-card{
  flex:0 0 460px;height:620px;position:relative;
  border:1px solid rgba(255,255,255,.08);overflow:hidden;
  transition:border-color .4s;will-change:transform;
  transform-style:preserve-3d;
}
.project-card:hover{border-color:var(--accent)}
.card-mock{width:100%;height:100%;position:relative;overflow:hidden;background:var(--card-bg);display:flex;flex-direction:column;justify-content:flex-end}
.card-mock-top{
  position:absolute;top:0;left:0;right:0;height:32px;
  background:rgba(0,0,0,.6);border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;padding:0 12px;gap:6px;
}
.card-dot{width:7px;height:7px;border-radius:50%}
.card-url{flex:1;height:16px;background:rgba(255,255,255,.06);border-radius:2px;margin-left:8px}
.card-visual{position:absolute;top:32px;left:0;right:0;bottom:0;overflow:hidden}
.card-visual-inner{width:100%;height:100%;position:relative}
.card-overlay{
  position:absolute;bottom:0;left:0;right:0;padding:36px 32px;
  background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.6) 60%,transparent 100%);
  z-index:2;
}
.card-vertical{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:500}
.card-name{font-family:'Playfair Display',Georgia,serif;font-size:28px;color:#fff;line-height:1.2;font-weight:700}
.card-desc{font-size:12px;color:rgba(255,255,255,.45);margin-top:8px;line-height:1.5;transform:translateY(16px);opacity:0;transition:all .4s ease}
.project-card:hover .card-desc{transform:translateY(0);opacity:1}
.card-view{
  display:inline-flex;align-items:center;gap:8px;margin-top:16px;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);text-decoration:none;
  opacity:0;transform:translateY(10px);transition:all .4s ease .05s;
}
.card-view::after{content:'→';transition:transform .3s}
.project-card:hover .card-view{opacity:1;transform:translateY(0)}
.project-card:hover .card-view:hover::after{transform:translateX(4px)}
.mock-block{border-radius:2px;background:rgba(255,255,255,.05);margin-bottom:8px}

/* ── STATEMENT ── */
#statement{position:relative;min-height:100vh;display:flex;align-items:center;z-index:1;overflow:hidden}
#vortex-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.statement-content{position:relative;z-index:2;width:100%;max-width:1400px;margin:0 auto;padding:0 88px;display:flex;align-items:center;gap:120px}
.statement-left{display:flex;flex-direction:column;gap:4px}
.counter-num{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(100px,14vw,220px);line-height:.9;
  background:linear-gradient(135deg,#9d00ff 0%,#00e5ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.counter-label{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.4);padding-left:4px}
.editorial-text{font-family:'Playfair Display',Georgia,serif;font-size:clamp(28px,4vw,68px);line-height:1.25;color:#fff;max-width:680px;font-style:italic}
.editorial-text em{font-style:normal;background:linear-gradient(90deg,#8b00ff,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── MOBILE ── */
@media(max-width:768px){
  #nav{padding:20px 24px}
  .nav-links{display:none}
  #hero-logo{font-size:clamp(40px,13vw,72px)}
  .hero-ctas{flex-direction:column;align-items:center;gap:14px}
  #projects-track{gap:20px;padding:0 20px}
  .project-card{flex:0 0 300px;height:440px}
  .statement-content{flex-direction:column;padding:80px 24px;gap:40px}
  .editorial-text{font-size:28px}
  #cursor-sphere,#cursor-canvas{display:none}
  body,a{cursor:auto}
}
</style>
</head>

<div id="cursor-sphere"></div>

<script>
/* ─────────────────────────────────────────────
   GUARD: verify critical libs loaded
───────────────────────────────────────────── */
if (typeof THREE  === 'undefined') console.error('[V] Three.js failed to load');
if (typeof gsap   === 'undefined') console.error('[V] GSAP failed to load');
if (typeof Lenis  === 'undefined') console.warn('[V]  Lenis failed to load — scroll will still work');

/* ─────────────────────────────────────────────
   GLOBALS
───────────────────────────────────────────── */
gsap.registerPlugin(ScrollTrigger);
const isMobile = window.innerWidth <= 768;
const mouse    = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

/* ─────────────────────────────────────────────
   LENIS
───────────────────────────────────────────── */
let lenis = null;
try {
  lenis = new Lenis({ lerp: 0.08, wheelMultiplier: 0.85, smoothTouch: false });
  lenis.on('scroll', ScrollTrigger.update);
  gsap.ticker.add(t => lenis.raf(t * 1000));
  gsap.ticker.lagSmoothing(0);
} catch(e) {
  console.warn('[V] Lenis init failed:', e.message, '— using native scroll');
}

/* ─────────────────────────────────────────────
   CURSOR SPHERE
───────────────────────────────────────────── */
const sphere = document.getElementById('cursor-sphere');
let cx = mouse.x, cy = mouse.y;
(function tickCursor() {
  cx += (mouse.x - cx) * 0.13;
  cy += (mouse.y - cy) * 0.13;
  sphere.style.left = cx + 'px';
  sphere.style.top  = cy + 'px';
  requestAnimationFrame(tickCursor);
})();
document.querySelectorAll('a,.project-card,[data-magnetic]').forEach(el => {
  el.addEventListener('mouseenter', () => gsap.to(sphere, { scale: 2.8, duration: .3, ease: 'power2.out' }));
  el.addEventListener('mouseleave', () => gsap.to(sphere, { scale: 1,   duration: .4, ease: 'elastic.out(1,.5)' }));
});

/* ─────────────────────────────────────────────
   MAIN SCENE — Nebula + Organic Mesh
───────────────────────────────────────────── */
let orgMesh = null, meshMat = null;

(function initMainScene() {
  if (typeof THREE === 'undefined') return;
  try {
    const canvas   = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping         = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.6;
    renderer.setClearColor(0x000000, 0);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 5;

    /* ── NEBULA PLANE ── */
    const nebMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime:  { value: 0 },
        uMouse: { value: new THREE.Vector2(0, 0) },
      },
      vertexShader: `varying vec2 vUv;
        void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader: `
        uniform float uTime; uniform vec2 uMouse; varying vec2 vUv;
        float h(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+74.27);return fract(p.x*p.y);}
        float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
          return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
        float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<7;i++){v+=a*n(p);p=p*2.1+vec2(1.7,9.2);a*=.5;}return v;}
        void main(){
          vec2 uv=vUv+uMouse*0.025;
          vec2 q=vec2(fbm(uv*2.+uTime*.04),fbm(uv*2.+vec2(5.2,1.3)+uTime*.035));
          vec2 r=vec2(fbm(uv*2.+2.*q+vec2(1.7,9.2)+uTime*.025),
                      fbm(uv*2.+2.*q+vec2(8.3,2.8)+uTime*.02));
          float f=fbm(uv*2.+2.5*r);
          vec3 c=mix(vec3(0),vec3(.18,0.,.48),clamp(f*2.,0.,1.));
          c=mix(c,vec3(.45,0.,.9),clamp(f*f*3.,0.,1.));
          c=mix(c,vec3(0.,.65,.95),clamp(length(q)*.9,0.,1.));
          float o1=exp(-9.*length(vUv-vec2(.28,.62)+uMouse*.04));
          float o2=exp(-11.*length(vUv-vec2(.72,.31)+uMouse*.03));
          float o3=exp(-7.*length(vUv-vec2(.82,.71)+uMouse*.02));
          c+=o1*vec3(.55,0.,1.)*.9;
          c+=o2*vec3(0.,.75,.95)*.9;
          c+=o3*vec3(.4,0.,.8)*(.5+.5*sin(uTime*.7));
          c=pow(clamp(c,0.,1.),vec3(.85))*.65;
          gl_FragColor=vec4(c,1.);
        }`,
      depthWrite: false,
    });
    const nebMesh = new THREE.Mesh(new THREE.PlaneGeometry(20, 12), nebMat);
    nebMesh.position.z = -4;
    scene.add(nebMesh);

    /* ── ORGANIC MESH ── */
    meshMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime:  { value: 0 },
        uAlpha: { value: 0 }, // starts invisible, fades in with logo animation
      },
      vertexShader: `
        uniform float uTime; varying vec3 vN; varying float vD;
        float hn(vec3 p){p=fract(p*vec3(443.9,397.3,491.2));p+=dot(p,p.yxz+19.2);return fract((p.x+p.y)*p.z);}
        float nn(vec3 p){vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
          return mix(mix(mix(hn(i),hn(i+vec3(1,0,0)),f.x),mix(hn(i+vec3(0,1,0)),hn(i+vec3(1,1,0)),f.x),f.y),
                     mix(mix(hn(i+vec3(0,0,1)),hn(i+vec3(1,0,1)),f.x),mix(hn(i+vec3(0,1,1)),hn(i+vec3(1,1,1)),f.x),f.y),f.z);}
        float fbm3(vec3 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*nn(p);p=p*2.1+vec3(1.7,9.2,3.1);a*=.5;}return v;}
        void main(){
          vN=normal;
          float d=fbm3((position+uTime*.12)*1.4)*.52; vD=d;
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position+normal*d,1.);
        }`,
      fragmentShader: `
        uniform float uTime; uniform float uAlpha; varying vec3 vN; varying float vD;
        void main(){
          float rim=pow(1.-max(dot(normalize(vN),vec3(0,0,1)),0.),2.8);
          vec3 base=vec3(.07,.04,.1);
          vec3 hi=mix(vec3(.42,0.,.85),vec3(0.,.72,.95),vD*2.);
          vec3 rimCol=mix(vec3(.5,0.,1.),vec3(0.,.8,1.),sin(uTime*.45)*.5+.5);
          vec3 col=base+hi*.28+rim*rimCol*.8;
          gl_FragColor=vec4(col,uAlpha);
        }`,
      transparent: true,
    });
    orgMesh = new THREE.Mesh(new THREE.SphereGeometry(1.6, 96, 96), meshMat);
    scene.add(orgMesh);

    /* ── SCROLL FADE ── */
    ScrollTrigger.create({
      trigger: '#hero', start: 'top top', end: 'bottom top',
      onUpdate: self => {
        if (meshMat) meshMat.uniforms.uAlpha.value = Math.max(0, meshMat.uniforms.uAlpha.value - self.getVelocity() * 0.0001);
        if (orgMesh)  orgMesh.visible = self.progress < 0.7;
      }
    });

    /* ── RESIZE ── */
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    /* ── LOOP ── */
    let t = 0;
    (function loop() {
      requestAnimationFrame(loop);
      t += 0.01;
      nebMat.uniforms.uTime.value  = t;
      nebMat.uniforms.uMouse.value.set(
        (mouse.x / window.innerWidth  - .5) * 2,
        -(mouse.y / window.innerHeight - .5) * 2
      );
      if (meshMat) meshMat.uniforms.uTime.value = t;
      if (orgMesh) {
        const tx = (mouse.y / window.innerHeight - .5) * .55;
        const ty = (mouse.x / window.innerWidth  - .5) * .9;
        orgMesh.rotation.x += (tx - orgMesh.rotation.x) * .05;
        orgMesh.rotation.y += (ty + t * .09 - orgMesh.rotation.y) * .05;
      }
      renderer.render(scene, camera);
    })();

  } catch(e) {
    console.error('[V] Main scene failed:', e);
  }
})();

/* ─────────────────────────────────────────────
   CURSOR TRAIL
───────────────────────────────────────────── */
(function initTrail() {
  if (isMobile || typeof THREE === 'undefined') return;
  try {
    const canvas   = document.getElementById('cursor-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setClearColor(0x000000, 0);

    const scene  = new THREE.Scene();
    const W = window.innerWidth, H = window.innerHeight;
    const cam = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, .1, 100);
    cam.position.z = 10;

    const LEN  = 50;
    const hist = Array.from({ length: LEN }, () => new THREE.Vector3(0, -9999, 0));
    let   idx  = 0;
    const toW  = (x, y) => new THREE.Vector3(x - W/2, -(y - H/2), 0);

    window.addEventListener('mousemove', e => {
      hist[idx % LEN] = toW(e.clientX, e.clientY);
      idx++;
    });

    const mat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: `attribute float aP; varying float vP; varying vec2 vUv2;
        void main(){ vP=aP; vUv2=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader: `uniform float uTime; varying float vP; varying vec2 vUv2;
        void main(){
          vec3 col=mix(vec3(.55,0.,1.),vec3(0.,.9,1.),vP);
          float a=vP*(1.-vP*.2)*.9;
          float rf=pow(1.-abs(vUv2.y*2.-1.),.6);
          gl_FragColor=vec4(col,a*rf);
        }`,
      transparent: true, blending: THREE.AdditiveBlending, depthWrite: false,
    });

    let tube = null, tt = 0;
    (function loop() {
      requestAnimationFrame(loop);
      tt += 0.016;
      mat.uniforms.uTime.value = tt;
      if (tube) { scene.remove(tube); tube.geometry.dispose(); tube = null; }
      const pts = [];
      for (let i = 0; i < LEN; i++) pts.push(hist[(idx - LEN + i + LEN * 2) % LEN]);
      let moving = false;
      for (let i = 1; i < pts.length; i++) if (pts[i].distanceTo(pts[i-1]) > 1.5) { moving = true; break; }
      if (moving) try {
        const curve = new THREE.CatmullRomCurve3(pts);
        const geo   = new THREE.TubeGeometry(curve, 50, 2.8, 6, false);
        const cnt   = geo.attributes.position.count;
        const prog  = new Float32Array(cnt);
        for (let i = 0; i < cnt; i++) prog[i] = i / cnt;
        geo.setAttribute('aP', new THREE.BufferAttribute(prog, 1));
        tube = new THREE.Mesh(geo, mat);
        scene.add(tube);
      } catch(e) {}
      renderer.render(scene, cam);
    })();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      cam.left = -window.innerWidth/2; cam.right  = window.innerWidth/2;
      cam.top  =  window.innerHeight/2; cam.bottom = -window.innerHeight/2;
      cam.updateProjectionMatrix();
    });
  } catch(e) {
    console.error('[V] Cursor trail failed:', e);
  }
})();

/* ─────────────────────────────────────────────
   CINEMATIC HERO LOGO ANIMATION
   Sequence:
   1. Chars drop in from above (staggered, 0.2s delay)
   2. WebGL mesh fades in behind it
   3. At 2.3s → FLIP logo from center to nav slot
   4. Nav logo appears, overlay hides
   5. Hero content reveals
───────────────────────────────────────────── */
function initHeroLogo() {
  const logoEl = document.getElementById('hero-logo');
  const text   = logoEl.textContent.trim();
  logoEl.innerHTML = '';

  const chars = [];
  for (const ch of text) {
    const s = document.createElement('span');
    s.className   = 'h-char';
    s.textContent = ch;
    logoEl.appendChild(s);
    chars.push(s);
  }

  // Set starting state
  gsap.set(chars, { opacity: 0, y: -80, filter: 'blur(12px)' });

  // --- PHASE 1: chars drop in ---
  gsap.to(chars, {
    opacity: 1, y: 0, filter: 'blur(0px)',
    duration: 0.85,
    stagger: 0.055,
    ease: 'power4.out',
    delay: 0.15,
    onStart: () => {
      // Fade in nebula behind the logo as chars start appearing
      gsap.to(document.getElementById('bg-canvas'), { opacity: 1, duration: 1.5 });
    }
  });

  // Mesh fades in while chars are animating
  gsap.to({ v: 0 }, {
    v: 1, delay: 0.4, duration: 1.8, ease: 'power2.out',
    onUpdate: function() {
      if (meshMat) meshMat.uniforms.uAlpha.value = this.targets()[0].v;
    }
  });

  // --- PHASE 2: FLIP to nav after 2.3s ---
  setTimeout(() => {
    flipLogoToNav();
  }, 2300);
}

function flipLogoToNav() {
  const heroEl = document.getElementById('hero-logo');
  const navEl  = document.getElementById('nav-logo');

  // Both elements must be in the DOM and laid out for accurate rects
  const hR = heroEl.getBoundingClientRect();
  const nR  = navEl.getBoundingClientRect();

  // Calculate transform: move center of hero-logo to center of nav-logo, scale to match height
  const scale = nR.height / hR.height;
  const tx    = (nR.left + nR.width  / 2) - (hR.left + hR.width  / 2);
  const ty    = (nR.top  + nR.height / 2) - (hR.top  + hR.height / 2);

  gsap.to(heroEl, {
    x: tx, y: ty, scale,
    transformOrigin: 'center center',
    duration: 1.4,
    ease: 'power4.inOut',
    onComplete: () => {
      // Show real nav logo (identical text, now in place)
      gsap.set(navEl, { opacity: 1 });
      // Fade out overlay silently
      gsap.to('#hero-logo-wrap', {
        opacity: 0, duration: 0.15,
        onComplete: () => { document.getElementById('hero-logo-wrap').style.display = 'none'; }
      });
      // Reveal hero content
      revealHeroContent();
    }
  });
}

function revealHeroContent() {
  const tl = gsap.timeline();
  tl.to('.hero-content', { opacity: 1, duration: 0.8, ease: 'power2.out' })
    .from('.tagline',    { y: 18, opacity: 0, duration: 0.6, ease: 'power2.out' }, '<')
    .from('.hero-ctas',  { y: 18, opacity: 0, duration: 0.6, ease: 'power2.out' }, '-=0.3')
    .to('.scroll-indicator', { opacity: 1, duration: 0.6 }, '-=0.2');
}

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
function attachMagnetic(el, strength) {
  el.addEventListener('mousemove', e => {
    const r = el.getBoundingClientRect();
    gsap.to(el, {
      x: ((e.clientX - r.left - r.width  / 2) / r.width)  * strength,
      y: ((e.clientY - r.top  - r.height / 2) / r.height) * strength,
      duration: .4, ease: 'power2.out'
    });
  });
  el.addEventListener('mouseleave', () => {
    gsap.to(el, { x: 0, y: 0, duration: .7, ease: 'elastic.out(1,.4)' });
  });
}
document.querySelectorAll('[data-magnetic]').forEach(el => attachMagnetic(el, 42));
document.querySelectorAll('.nav-link').forEach(el => attachMagnetic(el, 8));

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
function burst(x, y) {
  if (typeof anime === 'undefined') return;
  const cols = ['#8b00ff','#00e5ff','#ff00cc','#fff','#6600ff'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    const s = 3 + Math.random() * 4;
    p.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${s}px;height:${s}px;
      border-radius:50%;background:${cols[i % cols.length]};pointer-events:none;z-index:9997;`;
    document.body.appendChild(p);
    const ang = Math.random() * Math.PI * 2, dst = 60 + Math.random() * 120;
    anime({ targets: p,
      left: x + Math.cos(ang) * dst, top: y + Math.sin(ang) * dst,
      opacity: [1, 0], scale: [1, 0], duration: 500 + Math.random() * 400,
      easing: 'easeOutExpo', complete: () => p.remove()
    });
  }
}
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('mouseenter', e => burst(e.clientX, e.clientY));
});

/* ─────────────────────────────────────────────

function initHorizScroll() {
  const section = document.getElementById('projects-section');
  const track   = document.getElementById('projects-track');
  const totalW  = track.scrollWidth - window.innerWidth;
  if (totalW <= 0) return;
  gsap.to(track, {
    x: -totalW, ease: 'none',
    scrollTrigger: {
      trigger: section, start: 'top top', end: `+=${totalW + 100}`,
      pin: true, scrub: 1.4, anticipatePin: 1, invalidateOnRefresh: true,
    }
  });
}

/* ─────────────────────────────────────────────
   VORTEX HELIX
───────────────────────────────────────────── */
(function initVortex() {
  if (typeof THREE === 'undefined') return;
  try {
    const canvas = document.getElementById('vortex-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
    renderer.setClearColor(0x000000, 0);
    function resize() {
      renderer.setSize(canvas.offsetWidth || window.innerWidth, canvas.offsetHeight || window.innerHeight);
      camera.aspect = (canvas.offsetWidth || window.innerWidth) / (canvas.offsetHeight || window.innerHeight);
      camera.updateProjectionMatrix();
    }
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, 1, .1, 1000);
    camera.position.z = 9;
    resize();

    const turns = 6, ppt = 120;
    const pts   = [];
    for (let i = 0; i <= turns * ppt; i++) {
      const t = i / ppt;
      pts.push(new THREE.Vector3(Math.cos(t*Math.PI*2)*3, Math.sin(t*Math.PI*2)*3, (t-turns/2)*.9));
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    const vMat  = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: `attribute float aP; varying float vP;
        void main(){ vP=aP; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader: `uniform float uTime; varying float vP;
        void main(){
          vec3 col=mix(vec3(.52,0.,1.),vec3(0.,.88,1.),fract(vP+uTime*.12));
          float a=.6+.35*sin(vP*6.28+uTime*.9);
          gl_FragColor=vec4(col,a);
        }`,
      transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.DoubleSide
    });
    const geo  = new THREE.TubeGeometry(curve, turns*ppt, .035, 8, false);
    const cnt  = geo.attributes.position.count;
    const prog = new Float32Array(cnt);
    for (let i = 0; i < cnt; i++) prog[i] = i/cnt;
    geo.setAttribute('aP', new THREE.BufferAttribute(prog, 1));
    const helix = new THREE.Mesh(geo, vMat);
    scene.add(helix);

    let vt = 0, spd = 0, lSY = 0;
    if (lenis) lenis.on('scroll', ({ scroll }) => { spd = Math.abs(scroll - lSY); lSY = scroll; });

    (function loop() {
      requestAnimationFrame(loop);
      vt += 0.007 + spd * 0.0015; spd *= 0.88;
      helix.rotation.z = vt*.6; helix.rotation.x = vt*.15;
      vMat.uniforms.uTime.value = vt;
      renderer.render(scene, camera);
    })();
    new ResizeObserver(resize).observe(canvas.parentElement || canvas);
  } catch(e) { console.error('[V] Vortex failed:', e); }
})();
