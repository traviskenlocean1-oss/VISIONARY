<script>
gsap.registerPlugin(ScrollTrigger);

/* ── LENIS ── */
let lenis = null;
try {
  lenis = new Lenis({ lerp: 0.08, wheelMultiplier: 0.85, smoothTouch: false });
  lenis.on('scroll', ScrollTrigger.update);
  gsap.ticker.add(t => lenis.raf(t * 1000));
  gsap.ticker.lagSmoothing(0);
} catch(e) { console.warn('[V] Lenis:', e.message); }

/* ── MOUSE ── */
const mouse = { x: -9999, y: -9999 };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

/* ──────────────────────────────────────────────
   TREE SKELETON
   Trunk at BOTTOM CENTER, branches grow UPWARD.
   Coordinates: [xFraction, yFraction], y=0=top, y=1=bottom.
──────────────────────────────────────────────── */
const NODES = [
  [0.500, 0.980],  //  0  trunk base (bottom center)
  [0.500, 0.820],  //  1  lower trunk
  [0.500, 0.640],  //  2  first split
  [0.275, 0.555],  //  3  left main branch
  [0.725, 0.555],  //  4  right main branch
  [0.110, 0.405],  //  5  left-left secondary
  [0.365, 0.385],  //  6  left-right secondary
  [0.500, 0.465],  //  7  center secondary
  [0.635, 0.385],  //  8  right-left secondary
  [0.890, 0.405],  //  9  right-right secondary
  [0.050, 0.272],  // 10  TIP 0 — far left     (card 0)
  [0.188, 0.244],  // 11  TIP 1                 (card 1)
  [0.332, 0.228],  // 12  TIP 2                 (card 2)
  [0.500, 0.248],  // 13  TIP 3 — center        (card 3)
  [0.668, 0.228],  // 14  TIP 4                 (card 4)
  [0.812, 0.244],  // 15  TIP 5                 (card 5)
  [0.950, 0.272],  // 16  TIP 6 — far right     (card 6)
];

// [fromNode, toNode, depth]  depth: 0=trunk … 3=tips
const EDGES = [
  [0,  1,  0], [1,  2,  0],
  [2,  3,  1], [2,  4,  1], [2,  7,  1],
  [3,  5,  2], [3,  6,  2],
  [4,  8,  2], [4,  9,  2],
  [5, 10,  3], [5, 11,  3],
  [6, 12,  3],
  [7, 13,  3],
  [8, 14,  3],
  [9, 15,  3], [9, 16,  3],
];

const TIP_INDICES = [10, 11, 12, 13, 14, 15, 16];

const PROJECTS = [
  { name: 'Apex Construction',     vertical: 'Contractors',   url: 'https://effervescent-puppy-4b3695.netlify.app' },
  { name: 'KŌSAI Miami',          vertical: 'Restaurant',    url: 'https://restaurant-chi-two-55.vercel.app' },
  { name: 'Solène Atelier',       vertical: 'Beauty',        url: 'https://beauty.traviskenlocean1.workers.dev' },
  { name: 'Nova Black',            vertical: 'Automotive',    url: 'https://nova-black-murex.vercel.app' },
  { name: 'Summit Roofing Co',     vertical: 'Contractors',   url: 'https://profound-puppy-6dab0b.netlify.app' },
  { name: 'Lala Sweets',           vertical: 'Food & Sweets', url: 'https://lalasweets.vercel.app' },
  { name: 'Arctic Air & Plumbing', vertical: 'HVAC',          url: 'https://hvac-plumbing-demo.vercel.app' },
];

/* ── COLOR UTILITY ─────────────────────────────
   4-stop piecewise gradient:
   depth 0 → deep purple (88,28,190)
   depth 1 → violet      (124,58,237)
   depth 2 → cyan        (6,182,212)
   depth 3 → mint        (134,239,172)
──────────────────────────────────────────────── */
const COLOR_STOPS = [[88,28,190],[124,58,237],[6,182,212],[134,239,172]];

function treeRGB(cd, tw) {
  const s = Math.min(cd, 0.9999) * 3;
  const i = Math.floor(s), f = s - i;
  const a = COLOR_STOPS[i], b = COLOR_STOPS[i + 1];
  return [
    Math.round((a[0] + (b[0] - a[0]) * f) * tw),
    Math.round((a[1] + (b[1] - a[1]) * f) * tw),
    Math.round((a[2] + (b[2] - a[2]) * f) * tw),
  ];
}

/* ──────────────────────────────────────────────
   STAR BACKGROUND
──────────────────────────────────────────────── */
(function initStars() {
  const c = document.getElementById('star-canvas');
  const ctx = c.getContext('2d');
  let stars = [];

  function resize() {
    c.width = window.innerWidth; c.height = window.innerHeight;
    stars = Array.from({ length: 280 }, () => ({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      r: 0.25 + Math.random() * 1.1,
      a: 0.06 + Math.random() * 0.42,
      vx: (Math.random() - 0.5) * 0.05,
      vy: (Math.random() - 0.5) * 0.05,
      ph: Math.random() * Math.PI * 2,
    }));
  }
  resize();
  window.addEventListener('resize', resize);

  let t = 0;
  (function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0, 0, c.width, c.height);
    t += 0.007;
    stars.forEach(s => {
      s.x = (s.x + s.vx + c.width)  % c.width;
      s.y = (s.y + s.vy + c.height) % c.height;
      const tw = s.a * (0.55 + 0.45 * Math.sin(t * 1.6 + s.ph));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${tw.toFixed(3)})`;
      ctx.fill();
    });
  })();
})();

/* ──────────────────────────────────────────────
   PARTICLE TREE
──────────────────────────────────────────────── */
let treeParticles = [];
let leafPetals    = [];
let fireflies     = [];

function buildParticles() {
  const W = window.innerWidth, H = window.innerHeight;
  treeParticles = [];
  leafPetals    = [];
  fireflies     = [];

  // ── Branch particles ──
  EDGES.forEach(([ai, bi, depth]) => {
    const ax = NODES[ai][0] * W, ay = NODES[ai][1] * H;
    const bx = NODES[bi][0] * W, by = NODES[bi][1] * H;
    const len  = Math.hypot(bx - ax, by - ay);
    const dens = [3.4, 2.6, 2.1, 1.7][depth];
    const cnt  = Math.floor(len * dens);
    for (let i = 0; i < cnt; i++) {
      const t  = i / cnt;
      const cd = (depth + t) / 3.0;
      treeParticles.push({
        bx: ax + (bx - ax) * t,
        by: ay + (by - ay) * t,
        x: 0, y: 0, vx: 0, vy: 0,
        ph:  Math.random() * Math.PI * 2,
        ph2: Math.random() * Math.PI * 2,
        r:   0.7 + Math.random() * 1.8,
        cd,
        br:  0.4 + Math.random() * 0.6,
        depth,
      });
    }
  });

  // ── Leaf petals at each tip ──
  TIP_INDICES.forEach(tipIdx => {
    const count = 8 + Math.floor(Math.random() * 6);
    for (let i = 0; i < count; i++) {
      leafPetals.push({
        tipIdx,
        orbitR:   13 + Math.random() * 22,
        orbitPh:  Math.random() * Math.PI * 2,
        orbitSpd: (0.15 + Math.random() * 0.30) * (Math.random() < 0.5 ? 1 : -1),
        flutter:  Math.random() * Math.PI * 2,
        fltrSpd:  0.6 + Math.random() * 1.3,
        rx: 1.4 + Math.random() * 1.8,
        ry: 4.2 + Math.random() * 5.6,
        br: 0.48 + Math.random() * 0.52,
        isMint: Math.random() < 0.58,
      });
    }
  });

  // ── Firefly particles drifting around branches ──
  const allNodeIdxs = NODES.map((_, i) => i);
  for (let i = 0; i < 52; i++) {
    const nodeIdx = allNodeIdxs[Math.floor(Math.random() * allNodeIdxs.length)];
    fireflies.push({
      nodeIdx,
      offX: (Math.random() - 0.5) * 150,
      offY: (Math.random() - 0.5) * 110,
      ph:  Math.random() * Math.PI * 2,
      ph2: Math.random() * Math.PI * 2,
      ph3: Math.random() * Math.PI * 2,
      spX: 0.35 + Math.random() * 0.75,
      spY: 0.28 + Math.random() * 0.62,
      r:   2.0 + Math.random() * 3.2,
      br:  0.55 + Math.random() * 0.45,
      cd:  Math.random(),
    });
  }
}

(function initTree() {
  const c   = document.getElementById('tree-canvas');
  const ctx = c.getContext('2d');
  const REPEL = 100, STR = 6.0;

  function resize() {
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
    buildParticles();
    positionCards();
  }
  resize();
  window.addEventListener('resize', resize);

  let t = 0;
  (function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0, 0, c.width, c.height);
    t += 0.011;
    const mx = mouse.x, my = mouse.y;
    const W = c.width, H = c.height;

    // ── Branch particles ──
    treeParticles.forEach(p => {
      // Deeper branches sway more — bioluminescent breathing effect
      const swX = Math.sin(t * 0.31 + p.ph  * 0.55) * (2.0 + 4.2 * p.cd);
      const swY = Math.cos(t * 0.19 + p.ph2 * 0.40) * 1.2;
      const drX = Math.sin(t * 0.84 + p.ph)  * 1.5;
      const drY = Math.cos(t * 0.63 + p.ph2) * 1.5;

      let px = p.bx + swX + drX;
      let py = p.by + swY + drY;

      const dx = px - mx, dy = py - my;
      const d2 = dx * dx + dy * dy;
      if (d2 < REPEL * REPEL && d2 > 0.01) {
        const d = Math.sqrt(d2), f = (REPEL - d) / REPEL;
        p.vx += (dx / d) * f * STR * 0.10;
        p.vy += (dy / d) * f * STR * 0.10;
      }
      p.vx *= 0.88; p.vy *= 0.88;
      p.x = px + p.vx;
      p.y = py + p.vy;

      const tw = p.br * (0.46 + 0.54 * Math.sin(t * 2.1 + p.ph));
      const [rv, gv, bv] = treeRGB(p.cd, tw);
      const av = Math.min(tw, 0.93);

      // Glow halo
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 2.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rv},${gv},${bv},0.055)`;
      ctx.fill();
      // Core
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rv},${gv},${bv},${av.toFixed(3)})`;
      ctx.fill();
    });

    // ── Leaf petals (elongated ellipses, flutter at tips) ──
    leafPetals.forEach(p => {
      const n = NODES[p.tipIdx];
      const nx = n[0] * W, ny = n[1] * H;

      // Tip sway applied to orbit center
      const swX = Math.sin(t * 0.29 + p.orbitPh * 0.6) * 4.5;
      const swY = Math.cos(t * 0.21 + p.orbitPh * 0.4) * 1.8;

      p.orbitPh += p.orbitSpd * 0.011;
      p.flutter  += p.fltrSpd  * 0.011;

      const ox = Math.cos(p.orbitPh) * p.orbitR;
      const oy = Math.sin(p.orbitPh) * p.orbitR * 0.52;
      const px = nx + ox + swX;
      const py = ny + oy + swY;

      const tw = p.br * (0.5 + 0.5 * Math.sin(t * 1.9 + p.orbitPh));
      const alpha = tw * 0.85;

      // Petal glow halo
      ctx.save();
      ctx.translate(px, py);
      ctx.beginPath();
      ctx.arc(0, 0, p.rx * 4.5, 0, Math.PI * 2);
      ctx.fillStyle = p.isMint
        ? `rgba(134,239,172,${(alpha * 0.07).toFixed(3)})`
        : `rgba(220,255,230,${(alpha * 0.055).toFixed(3)})`;
      ctx.fill();
      ctx.restore();

      // Petal body — elongated ellipse via scale trick
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(p.flutter);
      ctx.scale(1, p.ry / p.rx);
      ctx.beginPath();
      ctx.arc(0, 0, p.rx, 0, Math.PI * 2);
      ctx.fillStyle = p.isMint
        ? `rgba(134,239,172,${(alpha * 0.88).toFixed(3)})`
        : `rgba(240,253,244,${(alpha * 0.72).toFixed(3)})`;
      ctx.fill();
      ctx.restore();
    });

    // ── Fireflies — larger orbs drifting like alien bioluminescence ──
    fireflies.forEach(f => {
      const n = NODES[f.nodeIdx];
      const nx = n[0] * W + f.offX;
      const ny = n[1] * H + f.offY;

      const fx = nx + Math.sin(t * f.spX + f.ph)  * 32;
      const fy = ny + Math.cos(t * f.spY + f.ph2) * 24;

      const tw = f.br * (0.52 + 0.48 * Math.sin(t * 1.1 + f.ph3));
      const [rv, gv, bv] = treeRGB(f.cd, tw);

      // Outer diffuse glow
      ctx.beginPath();
      ctx.arc(fx, fy, f.r * 5.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rv},${gv},${bv},0.035)`;
      ctx.fill();
      // Inner glow
      ctx.beginPath();
      ctx.arc(fx, fy, f.r * 2.4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rv},${gv},${bv},0.11)`;
      ctx.fill();
      // Bright core
      ctx.beginPath();
      ctx.arc(fx, fy, f.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rv},${gv},${bv},${(tw * 0.96).toFixed(3)})`;
      ctx.fill();
    });
  })();
})();

/* ──────────────────────────────────────────────
   PROJECT CARDS
──────────────────────────────────────────────── */
function positionCards() {
  const layer = document.getElementById('cards-layer');
  const W = window.innerWidth, H = window.innerHeight;

  if (layer.children.length === 0) {
    PROJECTS.forEach((proj, i) => {
      const card = document.createElement('div');
      card.className = 'proj-card';
      card.innerHTML =
        `<div class="pc-vertical">${proj.vertical}</div>` +
        `<div class="pc-name">${proj.name}</div>` +
        `<div class="pc-view">View Live ↗</div>`;
      card.addEventListener('click', () => window.open(proj.url, '_blank', 'noopener'));
      layer.appendChild(card);
    });

    gsap.to('.proj-card', {
      opacity: 1, duration: 0.7,
      stagger: { each: 0.09, from: 'random' },
      ease: 'power2.out', delay: 1.1,
    });
  }

  const HW = 68;
  Array.from(layer.children).forEach((card, i) => {
    const n  = NODES[TIP_INDICES[i]];
    const px = Math.max(HW, Math.min(W - HW, n[0] * W));
    const py = n[1] * H;
    card.style.left = px + 'px';
    card.style.top  = py + 'px';
  });
}

/* ──────────────────────────────────────────────
   CURSOR STARDUST  (canvas 2D, default cursor kept)
──────────────────────────────────────────────── */
(function initCursorTrail() {
  const c   = document.getElementById('cursor-canvas');
  const ctx = c.getContext('2d');

  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const pool = [];
  let lx = -9999, ly = -9999;

  window.addEventListener('mousemove', e => {
    if (Math.hypot(e.clientX - lx, e.clientY - ly) < 4) return;
    lx = e.clientX; ly = e.clientY;
    const n = 2 + (Math.random() < 0.36 ? 1 : 0);
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 0.32 + Math.random() * 0.88;
      pool.push({
        x: lx, y: ly,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - 0.22,
        life: 1.0,
        dec:  1 / (42 + Math.random() * 18),
        sz:   2.0 + Math.random() * 2.2,
        rot:  Math.random() * Math.PI,
        hue:  46 + Math.random() * 18,
      });
    }
  });

  function drawSparkle(x, y, sz, rot, alpha, hue) {
    ctx.save();
    ctx.translate(x, y); ctx.rotate(rot);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `hsl(${hue},100%,93%)`;
    ctx.beginPath();
    ctx.moveTo(0, -sz); ctx.lineTo(sz * 0.13, 0); ctx.lineTo(0, sz); ctx.lineTo(-sz * 0.13, 0);
    ctx.closePath(); ctx.fill();
    ctx.rotate(Math.PI * 0.5);
    ctx.beginPath();
    ctx.moveTo(0, -sz * 0.55); ctx.lineTo(sz * 0.085, 0); ctx.lineTo(0, sz * 0.55); ctx.lineTo(-sz * 0.085, 0);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  (function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0, 0, c.width, c.height);
    for (let i = pool.length - 1; i >= 0; i--) {
      const s = pool[i];
      s.x += s.vx; s.y += s.vy;
      s.vx *= 0.97; s.vy *= 0.97;
      s.life -= s.dec; s.rot += 0.042;
      if (s.life <= 0) { pool.splice(i, 1); continue; }
      drawSparkle(s.x, s.y, s.sz, s.rot, s.life * s.life, s.hue);
    }
  })();
})();

/* ── NAV SCROLL GLASS ── */
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60);
}, { passive: true });

/* ── HERO REVEAL ── */
gsap.set(['#hero-text', '#hero-ctas', '.scroll-indicator'], { opacity: 0 });
gsap.set('#hero-text', { y: 14 });
gsap.timeline({ delay: 0.5 })
  .to('#hero-text',        { opacity: 1, y: 0, duration: 1.3, ease: 'power3.out' })
  .to('#hero-ctas',        { opacity: 1,       duration: 0.9, ease: 'power2.out' }, '-=0.4')
  .to('.scroll-indicator', { opacity: 1,       duration: 0.8, ease: 'power2.out' }, '-=0.3');

/* ── PAGE TRANSITIONS ── */
gsap.set('#page-transition', { x: '100%' });
document.querySelectorAll('a[href]').forEach(a => {
  const hr = a.getAttribute('href');
  if (!hr || hr.startsWith('#') || hr.startsWith('mailto') || hr.startsWith('tel') || hr.startsWith('http')) return;
  a.addEventListener('click', e => {
    e.preventDefault();
    gsap.fromTo('#page-transition', { x: '100%' }, {
      x: '0%', duration: 0.5, ease: 'power3.inOut',
      onComplete: () => window.location.href = hr,
    });
  });
});
window.addEventListener('load', () => {
  gsap.fromTo('#page-transition', { x: '0%' }, { x: '-100%', duration: 0.6, delay: 0.1, ease: 'power3.inOut' });
});
</script>
