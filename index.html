<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

<script>
gsap.registerPlugin(ScrollTrigger);

/* ── LENIS ── */
let lenis = null;
try {
  lenis = new Lenis({ lerp: 0.08, wheelMultiplier: 0.85, smoothTouch: false });
  lenis.on('scroll', ScrollTrigger.update);
  gsap.ticker.add(t => lenis.raf(t * 1000));
  gsap.ticker.lagSmoothing(0);
} catch(e) { console.warn('[V] Lenis:', e.message); }

/* ── MOUSE ── */
const mouse = { x: -9999, y: -9999 };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

/* ─────────────────────────────────────────
   TREE SKELETON
   [xFraction, yFraction] of viewport
   Trunk at top-center, branches downward
─────────────────────────────────────────── */
const NODES = [
  [0.500, 0.005],  //  0  trunk top
  [0.500, 0.072],  //  1  upper trunk
  [0.500, 0.215],  //  2  first split
  [0.275, 0.368],  //  3  left main branch
  [0.725, 0.368],  //  4  right main branch
  [0.112, 0.538],  //  5  left-left
  [0.362, 0.522],  //  6  left-right
  [0.500, 0.445],  //  7  center drop
  [0.638, 0.522],  //  8  right-left
  [0.888, 0.538],  //  9  right-right
  [0.100, 0.735],  // 10  TIP 0 — far left    (card 0)
  [0.210, 0.705],  // 11  TIP 1               (card 1)
  [0.345, 0.742],  // 12  TIP 2               (card 2)
  [0.500, 0.672],  // 13  TIP 3 — center      (card 3)
  [0.655, 0.742],  // 14  TIP 4               (card 4)
  [0.790, 0.705],  // 15  TIP 5               (card 5)
  [0.900, 0.735],  // 16  TIP 6 — far right   (card 6)
];

// [fromNode, toNode, depth]  depth 0=trunk … 3=tips
const EDGES = [
  [0,  1,  0], [1,  2,  0],
  [2,  3,  1], [2,  4,  1], [2,  7,  1],
  [3,  5,  2], [3,  6,  2],
  [4,  8,  2], [4,  9,  2],
  [5,  10, 3], [5,  11, 3],
  [6,  12, 3],
  [7,  13, 3],
  [8,  14, 3],
  [9,  15, 3], [9,  16, 3],
];

const TIP_INDICES = [10, 11, 12, 13, 14, 15, 16];

const PROJECTS = [
  { name:'Maverick Contracting', vertical:'Contractors',   url:'work.html' },
  { name:'Ember & Oak',          vertical:'Restaurant',    url:'work.html' },
  { name:'Studio Noir',          vertical:'Beauty',        url:'work.html' },
  { name:'Apex Auto',            vertical:'Auto Dealer',   url:'work.html' },
  { name:'Titan Roofing',        vertical:'Contractors',   url:'work.html' },
  { name:'La Maison',            vertical:'Wellness',      url:'work.html' },
  { name:'Pacific HVAC',         vertical:'Home Services', url:'work.html' },
];

/* ─────────────────────────────────────────
   STAR BACKGROUND
─────────────────────────────────────────── */
(function initStars() {
  const c   = document.getElementById('star-canvas');
  const ctx = c.getContext('2d');
  let stars = [];

  function resize() {
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
    stars = Array.from({ length: 260 }, () => ({
      x:  Math.random() * c.width,
      y:  Math.random() * c.height,
      r:  0.28 + Math.random() * 1.0,
      a:  0.07 + Math.random() * 0.44,
      vx: (Math.random() - 0.5) * 0.055,
      vy: (Math.random() - 0.5) * 0.055,
      ph: Math.random() * Math.PI * 2,
    }));
  }
  resize();
  window.addEventListener('resize', resize);

  let t = 0;
  (function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0, 0, c.width, c.height);
    t += 0.007;
    stars.forEach(s => {
      s.x = (s.x + s.vx + c.width)  % c.width;
      s.y = (s.y + s.vy + c.height) % c.height;
      const tw = s.a * (0.55 + 0.45 * Math.sin(t * 1.6 + s.ph));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${tw.toFixed(3)})`;
      ctx.fill();
    });
  })();
})();

/* ─────────────────────────────────────────
   PARTICLE TREE
─────────────────────────────────────────── */
let treeParticles = [];

function buildParticles() {
  const W = window.innerWidth, H = window.innerHeight;
  treeParticles = [];

  EDGES.forEach(([ai, bi, depth]) => {
    const ax = NODES[ai][0] * W,  ay = NODES[ai][1] * H;
    const bx = NODES[bi][0] * W,  by = NODES[bi][1] * H;
    const len  = Math.hypot(bx - ax, by - ay);
    const dens = [3.2, 2.5, 2.0, 1.6][depth];
    const cnt  = Math.floor(len * dens);

    for (let i = 0; i < cnt; i++) {
      const t  = i / cnt;
      // color depth: 0 = deep purple, 1 = cyan
      const cd = (depth + t) / 3.6;
      treeParticles.push({
        bx: ax + (bx - ax) * t,
        by: ay + (by - ay) * t,
        x: 0, y: 0,
        vx: 0, vy: 0,
        ph:  Math.random() * Math.PI * 2,
        ph2: Math.random() * Math.PI * 2,
        r:   0.75 + Math.random() * 1.7,
        cd,
        br:  0.42 + Math.random() * 0.58,
        depth,
      });
    }
  });
}

(function initTree() {
  const c   = document.getElementById('tree-canvas');
  const ctx = c.getContext('2d');
  const REPEL = 88, STR = 5.8;

  function resize() {
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
    buildParticles();
    positionCards();
  }
  resize();
  window.addEventListener('resize', resize);

  let t = 0;
  (function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0, 0, c.width, c.height);
    t += 0.011;
    const mx = mouse.x, my = mouse.y;

    treeParticles.forEach(p => {
      // Sway — tip branches sway more than trunk
      const swX = Math.sin(t * 0.31 + p.ph  * 0.55) * (2.2 + 3.8 * p.cd);
      const swY = Math.cos(t * 0.19 + p.ph2 * 0.40) * 1.1;
      // Gentle drift
      const drX = Math.sin(t * 0.84 + p.ph)  * 1.4;
      const drY = Math.cos(t * 0.63 + p.ph2) * 1.4;

      let px = p.bx + swX + drX;
      let py = p.by + swY + drY;

      // Cursor repulsion
      const dx = px - mx, dy = py - my;
      const d2 = dx * dx + dy * dy;
      if (d2 < REPEL * REPEL && d2 > 0.01) {
        const d = Math.sqrt(d2);
        const f = (REPEL - d) / REPEL;
        p.vx += (dx / d) * f * STR * 0.10;
        p.vy += (dy / d) * f * STR * 0.10;
      }
      p.vx *= 0.88;
      p.vy *= 0.88;
      p.x = px + p.vx;
      p.y = py + p.vy;

      // Twinkle
      const tw = p.br * (0.48 + 0.52 * Math.sin(t * 2.1 + p.ph));

      // Color: purple(138,0,255) → cyan(0,212,228)
      const rv = Math.round((138 - 138 * p.cd) * tw);
      const gv = Math.round(212 * p.cd * tw);
      const bv = Math.round((255 - 27  * p.cd) * tw);
      const av = Math.min(tw, 0.92);

      // Soft glow halo
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 2.6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rv},${gv},${bv},0.07)`;
      ctx.fill();
      // Core particle
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rv},${gv},${bv},${av.toFixed(3)})`;
      ctx.fill();
    });
  })();
})();

/* ─────────────────────────────────────────
   PROJECT CARDS
─────────────────────────────────────────── */
function positionCards() {
  const layer = document.getElementById('cards-layer');
  const W = window.innerWidth, H = window.innerHeight;

  // Build cards once
  if (layer.children.length === 0) {
    PROJECTS.forEach((proj, i) => {
      const card = document.createElement('div');
      card.className = 'proj-card';
      card.innerHTML = `<div class="pc-vertical">${proj.vertical}</div>
                        <div class="pc-name">${proj.name}</div>`;
      card.addEventListener('click', () => {
        gsap.fromTo('#page-transition', { x: '100%' }, {
          x: '0%', duration: 0.5, ease: 'power3.inOut',
          onComplete: () => window.location.href = proj.url,
        });
      });
      layer.appendChild(card);
    });

    // Staggered reveal after tree appears
    gsap.to('.proj-card', {
      opacity: 1, duration: 0.7,
      stagger: { each: 0.09, from: 'random' },
      ease: 'power2.out', delay: 1.1,
    });
  }

  // Position each card at its tip node, clamped from screen edges
  const HW = 62; // half of widest card state
  Array.from(layer.children).forEach((card, i) => {
    const n  = NODES[TIP_INDICES[i]];
    const px = Math.max(HW, Math.min(W - HW, n[0] * W));
    const py = n[1] * H;
    card.style.left = px + 'px';
    card.style.top  = py + 'px';
  });
}

/* ─────────────────────────────────────────
   CURSOR STARDUST  (canvas 2D, default cursor kept)
─────────────────────────────────────────── */
(function initCursorTrail() {
  const c   = document.getElementById('cursor-canvas');
  const ctx = c.getContext('2d');

  function resize() {
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const pool = [];
  let lx = -9999, ly = -9999;

  window.addEventListener('mousemove', e => {
    if (Math.hypot(e.clientX - lx, e.clientY - ly) < 4) return;
    lx = e.clientX; ly = e.clientY;
    const n = 2 + (Math.random() < 0.36 ? 1 : 0);
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 0.32 + Math.random() * 0.88;
      pool.push({
        x:   lx, y: ly,
        vx:  Math.cos(ang) * spd,
        vy:  Math.sin(ang) * spd - 0.22,
        life: 1.0,
        dec: 1 / (42 + Math.random() * 18),
        sz:  2.0 + Math.random() * 2.2,
        rot: Math.random() * Math.PI,
        hue: 46 + Math.random() * 18,
      });
    }
  });

  function drawSparkle(x, y, sz, rot, alpha, hue) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `hsl(${hue},100%,93%)`;
    // Vertical arm
    ctx.beginPath();
    ctx.moveTo(0, -sz);
    ctx.lineTo(sz * 0.13, 0);
    ctx.lineTo(0,  sz);
    ctx.lineTo(-sz * 0.13, 0);
    ctx.closePath();
    ctx.fill();
    // Cross arm (90° rotated, 55% length)
    ctx.rotate(Math.PI * 0.5);
    ctx.beginPath();
    ctx.moveTo(0, -sz * 0.55);
    ctx.lineTo(sz * 0.085, 0);
    ctx.lineTo(0,  sz * 0.55);
    ctx.lineTo(-sz * 0.085, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  (function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0, 0, c.width, c.height);
    for (let i = pool.length - 1; i >= 0; i--) {
      const s = pool[i];
      s.x    += s.vx;
      s.y    += s.vy;
      s.vx   *= 0.97;
      s.vy   *= 0.97;
      s.life -= s.dec;
      s.rot  += 0.042;
      if (s.life <= 0) { pool.splice(i, 1); continue; }
      drawSparkle(s.x, s.y, s.sz, s.rot, s.life * s.life, s.hue);
    }
  })();
})();

/* ─────────────────────────────────────────
   NAV SCROLL GLASS
─────────────────────────────────────────── */
ScrollTrigger.create({
  start: 'top -60',
  onUpdate: s => document.getElementById('nav').classList.toggle('scrolled', s.scroll() > 60),
});

/* ─────────────────────────────────────────
   HERO REVEAL
─────────────────────────────────────────── */
gsap.set(['#hero-text', '#hero-ctas', '.scroll-indicator'], { opacity: 0 });
gsap.set('#hero-text', { y: 14 });

gsap.timeline({ delay: 0.5 })
  .to('#hero-text',        { opacity: 1, y: 0, duration: 1.3, ease: 'power3.out' })
  .to('#hero-ctas',        { opacity: 1,       duration: 0.9, ease: 'power2.out' }, '-=0.4')
  .to('.scroll-indicator', { opacity: 1,       duration: 0.8, ease: 'power2.out' }, '-=0.3');

/* ─────────────────────────────────────────
   COUNTER
─────────────────────────────────────────── */
ScrollTrigger.create({
  trigger: '#counter', start: 'top 72%', once: true,
  onEnter: () => {
    const el = document.querySelector('.counter-num');
    gsap.from('.counter-num',    { opacity: 0, scale: 0.5, duration: 1.4, ease: 'back.out(2)' });
    gsap.from('.counter-label',  { opacity: 0, y: 16,      duration: 0.9, ease: 'power2.out', delay: 0.25 });
    gsap.from('.editorial-text', { opacity: 0, y: 40,      duration: 1.2, ease: 'power3.out', delay: 0.5 });
    gsap.to({ v: 0 }, {
      v: 7, duration: 2.4, ease: 'power2.out', delay: 0.3,
      onUpdate: function() { el.textContent = Math.round(this.targets()[0].v); },
    });
  },
});

/* ─────────────────────────────────────────
   PAGE TRANSITIONS
─────────────────────────────────────────── */
gsap.set('#page-transition', { x: '100%' });
document.querySelectorAll('a[href]').forEach(a => {
  const hr = a.getAttribute('href');
  if (!hr || hr.startsWith('#') || hr.startsWith('mailto') || hr.startsWith('tel') || hr.startsWith('http')) return;
  a.addEventListener('click', e => {
    e.preventDefault();
    gsap.fromTo('#page-transition', { x: '100%' }, {
      x: '0%', duration: 0.5, ease: 'power3.inOut',
      onComplete: () => window.location.href = hr,
    });
  });
});
window.addEventListener('load', () => {
  gsap.fromTo('#page-transition', { x: '0%' }, { x: '-100%', duration: 0.6, delay: 0.1, ease: 'power3.inOut' });
});
</script>
</body>
</html>
