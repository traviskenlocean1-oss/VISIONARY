<script>
gsap.registerPlugin(ScrollTrigger);

/* ── LENIS ── */
let lenis = null;
try {
  lenis = new Lenis({ lerp:0.08, wheelMultiplier:0.85, smoothTouch:false });
  lenis.on('scroll', ScrollTrigger.update);
  gsap.ticker.add(t => lenis.raf(t * 1000));
  gsap.ticker.lagSmoothing(0);
} catch(e) { console.warn('[V] Lenis:', e.message); }

/* ── MOUSE ── */
const mouse = { x:-9999, y:-9999 };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

/* ══════════════════════════════════════════════════════════
   TREE — Bezier-curve branch segments.
   All coords are [xFraction, yFraction] of viewport.
   y=0 = top, y=1 = bottom. Trunk starts at BOTTOM CENTER.
   Each branch: { p0, cp, p1, d }
     p0 = start point (fraction)
     cp = quadratic bezier control point (fraction)
     p1 = end point (fraction)
     d  = depth (0=trunk, 1=main, 2=secondary, 3=tip)
══════════════════════════════════════════════════════════ */
const BRANCHES = [
  // ── Trunk ──
  { p0:[0.500,0.992], cp:[0.499,0.845], p1:[0.500,0.698], d:0 },

  // ── Main branches (d=1) ──
  { p0:[0.500,0.698], cp:[0.348,0.606], p1:[0.205,0.492], d:1 },  // left
  { p0:[0.500,0.698], cp:[0.500,0.622], p1:[0.500,0.532], d:1 },  // center
  { p0:[0.500,0.698], cp:[0.652,0.606], p1:[0.795,0.492], d:1 },  // right

  // ── Secondary branches (d=2) ──
  { p0:[0.205,0.492], cp:[0.118,0.418], p1:[0.068,0.340], d:2 },  // left-left
  { p0:[0.205,0.492], cp:[0.272,0.416], p1:[0.330,0.340], d:2 },  // left-right
  { p0:[0.795,0.492], cp:[0.728,0.416], p1:[0.670,0.340], d:2 },  // right-left
  { p0:[0.795,0.492], cp:[0.882,0.418], p1:[0.932,0.340], d:2 },  // right-right

  // ── Tip branches (d=3) — 7 total, one project card each ──
  { p0:[0.068,0.340], cp:[0.046,0.324], p1:[0.062,0.304], d:3 },  // TIP 0 — Apex Construction
  { p0:[0.068,0.340], cp:[0.100,0.322], p1:[0.162,0.296], d:3 },  // TIP 1 — KŌSAI Miami
  { p0:[0.330,0.340], cp:[0.314,0.322], p1:[0.302,0.295], d:3 },  // TIP 2 — Solène Atelier
  { p0:[0.500,0.532], cp:[0.500,0.450], p1:[0.500,0.364], d:3 },  // TIP 3 — Nova Black (center)
  { p0:[0.670,0.340], cp:[0.686,0.322], p1:[0.698,0.295], d:3 },  // TIP 4 — Summit Roofing
  { p0:[0.932,0.340], cp:[0.900,0.322], p1:[0.838,0.296], d:3 },  // TIP 5 — Lala Sweets
  { p0:[0.932,0.340], cp:[0.952,0.324], p1:[0.938,0.304], d:3 },  // TIP 6 — Arctic Air
];

// p1 endpoints of depth-3 branches — where project cards sit
const TIP_POINTS = BRANCHES.filter(b => b.d === 3).map(b => b.p1);

const PROJECTS = [
  { name:'Apex Construction',     vertical:'Contractors',   url:'https://effervescent-puppy-4b3695.netlify.app' },
  { name:'KŌSAI Miami',          vertical:'Restaurant',    url:'https://restaurant-chi-two-55.vercel.app' },
  { name:'Solène Atelier',       vertical:'Beauty',        url:'https://beauty.traviskenlocean1.workers.dev' },
  { name:'Nova Black',            vertical:'Automotive',    url:'https://nova-black-murex.vercel.app' },
  { name:'Summit Roofing Co',     vertical:'Contractors',   url:'https://profound-puppy-6dab0b.netlify.app' },
  { name:'Lala Sweets',           vertical:'Food & Sweets', url:'https://lalasweets.vercel.app' },
  { name:'Arctic Air & Plumbing', vertical:'HVAC',          url:'https://hvac-plumbing-demo.vercel.app' },
];

/* ── Color utility ──────────────────────────────────────
   Piecewise 4-stop gradient:
   d=0 deep purple (88,28,190) → d=1 violet (124,58,237)
   d=2 cyan (6,182,212) → d=3 mint (134,239,172)
──────────────────────────────────────────────────────── */
const CLR = [[88,28,190],[124,58,237],[6,182,212],[134,239,172]];
function treeRGB(cd, tw) {
  const s = Math.min(cd, 0.9999) * 3;
  const i = Math.floor(s), f = s - i;
  const a = CLR[i], b = CLR[i+1];
  return [
    Math.round((a[0]+(b[0]-a[0])*f)*tw),
    Math.round((a[1]+(b[1]-a[1])*f)*tw),
    Math.round((a[2]+(b[2]-a[2])*f)*tw),
  ];
}

/* ── Quadratic bezier point ── */
function bpt(t, p0, cp, p1) {
  const m = 1-t;
  return [m*m*p0[0]+2*m*t*cp[0]+t*t*p1[0], m*m*p0[1]+2*m*t*cp[1]+t*t*p1[1]];
}

/* ══════════════════════════════════════
   STAR BACKGROUND
══════════════════════════════════════ */
(function initStars(){
  const c = document.getElementById('star-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){
    c.width=window.innerWidth; c.height=window.innerHeight;
    stars = Array.from({length:280},()=>({
      x:Math.random()*c.width, y:Math.random()*c.height,
      r:0.25+Math.random()*1.1, a:0.06+Math.random()*0.42,
      vx:(Math.random()-.5)*.05, vy:(Math.random()-.5)*.05,
      ph:Math.random()*Math.PI*2,
    }));
  }
  resize(); window.addEventListener('resize',resize);
  let t=0;
  (function loop(){
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,c.width,c.height); t+=.007;
    stars.forEach(s=>{
      s.x=(s.x+s.vx+c.width)%c.width;
      s.y=(s.y+s.vy+c.height)%c.height;
      const tw=s.a*(.55+.45*Math.sin(t*1.6+s.ph));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${tw.toFixed(3)})`; ctx.fill();
    });
  })();
})();

/* ══════════════════════════════════════
   PARTICLE TREE — bezier curves, leaves, fireflies
══════════════════════════════════════ */
let treeParticles=[], leafPetals=[], fireflies=[];

function buildParticles(){
  const W=window.innerWidth, H=window.innerHeight;
  treeParticles=[]; leafPetals=[]; fireflies=[];

  const DENS=[2.8,1.9,1.6,1.3]; // particles per pixel by depth

  BRANCHES.forEach(br=>{
    const p0=[br.p0[0]*W, br.p0[1]*H];
    const cp=[br.cp[0]*W, br.cp[1]*H];
    const p1=[br.p1[0]*W, br.p1[1]*H];

    // Estimate arc length by sampling 24 points
    let len=0, prev=p0.slice();
    for(let k=1;k<=24;k++){
      const pt=bpt(k/24,p0,cp,p1);
      len+=Math.hypot(pt[0]-prev[0],pt[1]-prev[1]);
      prev=pt;
    }

    const cnt=Math.max(4, Math.floor(len*DENS[br.d]));
    for(let i=0;i<cnt;i++){
      const t=i/cnt;
      const [bx,by]=bpt(t,p0,cp,p1);
      const cd=(br.d+t)/3.0;
      treeParticles.push({
        bx,by, x:0,y:0, vx:0,vy:0,
        ph:Math.random()*Math.PI*2,
        ph2:Math.random()*Math.PI*2,
        r:0.7+Math.random()*1.9,
        cd, br:0.38+Math.random()*0.62,
        depth:br.d,
      });
    }
  });

  // Leaf petals — cluster at each tip endpoint
  TIP_POINTS.forEach(tp=>{
    const count=9+Math.floor(Math.random()*6);
    for(let i=0;i<count;i++){
      leafPetals.push({
        bx:tp[0]*W, by:tp[1]*H,
        orbitR:  12+Math.random()*22,
        orbitPh: Math.random()*Math.PI*2,
        orbitSpd:(0.14+Math.random()*0.28)*(Math.random()<.5?1:-1),
        flutter: Math.random()*Math.PI*2,
        fltrSpd: 0.55+Math.random()*1.25,
        rx:1.3+Math.random()*1.7,
        scaleY:3.0+Math.random()*2.2,
        br:0.45+Math.random()*0.55,
        isMint:Math.random()<.6,
      });
    }
  });

  // Fireflies — large bright orbs drifting around branch endpoints
  const anchors=[...BRANCHES.map(b=>[b.p1[0]*W,b.p1[1]*H])];
  for(let i=0;i<55;i++){
    const anch=anchors[Math.floor(Math.random()*anchors.length)];
    fireflies.push({
      ax:anch[0]+(Math.random()-.5)*130,
      ay:anch[1]+(Math.random()-.5)*95,
      ph:Math.random()*Math.PI*2,
      ph2:Math.random()*Math.PI*2,
      ph3:Math.random()*Math.PI*2,
      spX:0.30+Math.random()*0.72,
      spY:0.24+Math.random()*0.58,
      r:2.0+Math.random()*3.0,
      br:0.55+Math.random()*0.45,
      cd:Math.random(),
    });
  }
}

(function initTree(){
  const c   = document.getElementById('tree-canvas');
  const ctx = c.getContext('2d');
  const REPEL=100, STR=6.2;

  function resize(){
    c.width=window.innerWidth; c.height=window.innerHeight;
    buildParticles(); positionCards();
  }
  resize(); window.addEventListener('resize',resize);

  let t=0;
  (function loop(){
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,c.width,c.height);
    t+=.011;
    const mx=mouse.x, my=mouse.y;
    const W=c.width, H=c.height;

    // ── Branch particles ──
    treeParticles.forEach(p=>{
      // Organic sway — deeper tips sway more than dense trunk
      const swX=Math.sin(t*.30+p.ph*.54)*(1.8+4.5*p.cd);
      const swY=Math.cos(t*.18+p.ph2*.38)*1.1;
      const drX=Math.sin(t*.82+p.ph)*1.4;
      const drY=Math.cos(t*.61+p.ph2)*1.3;

      const px=p.bx+swX+drX, py=p.by+swY+drY;
      const dx=px-mx, dy=py-my;
      const d2=dx*dx+dy*dy;
      if(d2<REPEL*REPEL&&d2>0.01){
        const d=Math.sqrt(d2), f=(REPEL-d)/REPEL;
        p.vx+=(dx/d)*f*STR*.10;
        p.vy+=(dy/d)*f*STR*.10;
      }
      p.vx*=.88; p.vy*=.88;
      p.x=px+p.vx; p.y=py+p.vy;

      const tw=p.br*(.46+.54*Math.sin(t*2.1+p.ph));
      const [rv,gv,bv]=treeRGB(p.cd,tw);
      const av=Math.min(tw,.93);

      // Glow halo
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*2.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},0.055)`; ctx.fill();
      // Core
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${av.toFixed(3)})`; ctx.fill();
    });

    // ── Leaf petals — elongated ovals fluttering at branch tips ──
    leafPetals.forEach(p=>{
      const swX=Math.sin(t*.28+p.orbitPh*.6)*4.8;
      const swY=Math.cos(t*.20+p.orbitPh*.4)*1.9;
      p.orbitPh+=p.orbitSpd*.011;
      p.flutter +=p.fltrSpd*.011;
      const ox=Math.cos(p.orbitPh)*p.orbitR;
      const oy=Math.sin(p.orbitPh)*p.orbitR*.50;
      const px=p.bx+ox+swX, py=p.by+oy+swY;
      const tw=p.br*(.5+.5*Math.sin(t*1.9+p.orbitPh));
      const alpha=tw*.88;

      // Outer glow
      ctx.save(); ctx.translate(px,py);
      ctx.beginPath(); ctx.arc(0,0,p.rx*4.8,0,Math.PI*2);
      ctx.fillStyle=p.isMint
        ?`rgba(134,239,172,${(alpha*.065).toFixed(3)})`
        :`rgba(220,255,230,${(alpha*.05).toFixed(3)})`;
      ctx.fill(); ctx.restore();

      // Petal body — scale vertically for teardrop/oval shape
      ctx.save(); ctx.translate(px,py); ctx.rotate(p.flutter);
      ctx.scale(1,p.scaleY);
      ctx.beginPath(); ctx.arc(0,0,p.rx,0,Math.PI*2);
      ctx.fillStyle=p.isMint
        ?`rgba(134,239,172,${(alpha*.90).toFixed(3)})`
        :`rgba(240,253,244,${(alpha*.75).toFixed(3)})`;
      ctx.fill(); ctx.restore();
    });

    // ── Fireflies — large bioluminescent orbs drifting around branches ──
    fireflies.forEach(f=>{
      const fx=f.ax+Math.sin(t*f.spX+f.ph)*34;
      const fy=f.ay+Math.cos(t*f.spY+f.ph2)*26;
      const tw=f.br*(.52+.48*Math.sin(t*1.1+f.ph3));
      const [rv,gv,bv]=treeRGB(f.cd,tw);
      ctx.beginPath(); ctx.arc(fx,fy,f.r*5.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},0.032)`; ctx.fill();
      ctx.beginPath(); ctx.arc(fx,fy,f.r*2.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},0.10)`; ctx.fill();
      ctx.beginPath(); ctx.arc(fx,fy,f.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${(tw*.96).toFixed(3)})`; ctx.fill();
    });
  })();
})();

/* ══════════════════════════════════════
   PROJECT CARDS
══════════════════════════════════════ */
function positionCards(){
  const layer=document.getElementById('cards-layer');
  const W=window.innerWidth, H=window.innerHeight;

  if(layer.children.length===0){
    PROJECTS.forEach((proj,i)=>{
      const card=document.createElement('div');
      card.className='proj-card';
      card.innerHTML=
        `<div class="pc-vertical">${proj.vertical}</div>`+
        `<div class="pc-name">${proj.name}</div>`+
        `<div class="pc-view">View Live ↗</div>`;
      card.addEventListener('click',()=>window.open(proj.url,'_blank','noopener'));
      layer.appendChild(card);
    });
    gsap.to('.proj-card',{
      opacity:1, duration:.7,
      stagger:{each:.09,from:'random'},
      ease:'power2.out', delay:3.8, // after book intro completes
    });
  }

  const HW=66; // half-width clamp for near-edge cards
  Array.from(layer.children).forEach((card,i)=>{
    const tp=TIP_POINTS[i];
    const px=Math.max(HW,Math.min(W-HW,tp[0]*W));
    const py=tp[1]*H;
    card.style.left=px+'px';
    card.style.top =py+'px';
  });
}

/* ══════════════════════════════════════
   CURSOR STARDUST
══════════════════════════════════════ */
(function initCursorTrail(){
  const c=document.getElementById('cursor-canvas');
  const ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  const pool=[];
  let lx=-9999,ly=-9999;
  window.addEventListener('mousemove',e=>{
    if(Math.hypot(e.clientX-lx,e.clientY-ly)<4)return;
    lx=e.clientX; ly=e.clientY;
    const n=2+(Math.random()<.36?1:0);
    for(let i=0;i<n;i++){
      const ang=Math.random()*Math.PI*2, spd=.32+Math.random()*.88;
      pool.push({
        x:lx,y:ly, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-.22,
        life:1.0, dec:1/(42+Math.random()*18),
        sz:2.0+Math.random()*2.2, rot:Math.random()*Math.PI,
        hue:46+Math.random()*18,
      });
    }
  });
  function drawSparkle(x,y,sz,rot,alpha,hue){
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.globalAlpha=alpha;
    ctx.fillStyle=`hsl(${hue},100%,93%)`;
    ctx.beginPath(); ctx.moveTo(0,-sz); ctx.lineTo(sz*.13,0); ctx.lineTo(0,sz); ctx.lineTo(-sz*.13,0); ctx.closePath(); ctx.fill();
    ctx.rotate(Math.PI*.5);
    ctx.beginPath(); ctx.moveTo(0,-sz*.55); ctx.lineTo(sz*.085,0); ctx.lineTo(0,sz*.55); ctx.lineTo(-sz*.085,0); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  (function loop(){
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=pool.length-1;i>=0;i--){
      const s=pool[i];
      s.x+=s.vx; s.y+=s.vy; s.vx*=.97; s.vy*=.97;
      s.life-=s.dec; s.rot+=.042;
      if(s.life<=0){pool.splice(i,1);continue;}
      drawSparkle(s.x,s.y,s.sz,s.rot,s.life*s.life,s.hue);
    }
  })();
})();

/* ══════════════════════════════════════
   BOOK INTRO ANIMATION
══════════════════════════════════════ */
(function initBookIntro(){
  // Panels hinge from the center seam (right edge of left, left edge of right)
  gsap.set('#book-left',  { transformOrigin:'right center',  rotationY:0 });
  gsap.set('#book-right', { transformOrigin:'left center',   rotationY:0 });
  gsap.set('#book-logo',  { opacity:1 });

  gsap.timeline({ delay:1.5 })
    // Logo fades first as panels begin to pull apart
    .to('#book-logo',  { opacity:0, duration:.40, ease:'power2.in' })
    // Both panels swing open simultaneously — heavy cinematic arc
    .to('#book-left',  { rotationY:-108, y:10, duration:1.2, ease:'power2.inOut' }, '-=0.15')
    .to('#book-right', { rotationY: 108, y:10, duration:1.2, ease:'power2.inOut' }, '<')
    // Entire intro fades out as panels clear frame
    .to('#book-intro',  { opacity:0, duration:.35, pointerEvents:'none',
      onComplete(){ document.getElementById('book-intro').style.display='none'; }
    }, '-=0.25')
    // Hero text and CTAs reveal after intro fully gone
    .call(startHeroReveal);
})();

/* ══════════════════════════════════════
   HERO REVEAL (called after book closes)
══════════════════════════════════════ */
gsap.set(['#hero-text','#hero-ctas','.scroll-indicator'], { opacity:0 });
gsap.set('#hero-text', { y:14 });

function startHeroReveal(){
  gsap.timeline({ delay:.12 })
    .to('#hero-text',        { opacity:1, y:0, duration:1.3, ease:'power3.out' })
    .to('#hero-ctas',        { opacity:1,      duration:.9,  ease:'power2.out' }, '-=.4')
    .to('.scroll-indicator', { opacity:1,      duration:.8,  ease:'power2.out' }, '-=.3');
}

/* ══════════════════════════════════════
   NAV + PAGE TRANSITIONS
══════════════════════════════════════ */
window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('scrolled',window.scrollY>60);
},{passive:true});

gsap.set('#page-transition',{x:'100%'});
document.querySelectorAll('a[href]').forEach(a=>{
  const hr=a.getAttribute('href');
  if(!hr||hr.startsWith('#')||hr.startsWith('mailto')||hr.startsWith('tel')||hr.startsWith('http'))return;
  a.addEventListener('click',e=>{
    e.preventDefault();
    gsap.fromTo('#page-transition',{x:'100%'},{
      x:'0%',duration:.5,ease:'power3.inOut',
      onComplete:()=>window.location.href=hr,
    });
  });
});
window.addEventListener('load',()=>{
  gsap.fromTo('#page-transition',{x:'0%'},{x:'-100%',duration:.6,delay:.1,ease:'power3.inOut'});
});
</script>
