<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#8b00ff;--cyan:#00e5ff;--purple-neon:#9d00ff;--cyan-neon:#00ffff;
  --white:#ffffff;--black:#000000;
}
html{scroll-behavior:auto}
body{
  background:#000;color:#fff;overflow-x:hidden;cursor:none;
  font-family:'Inter',sans-serif;
}
a{cursor:none}

/* ── FIXED CANVASES ── */
#bg-canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;
}
#cursor-canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:9998;pointer-events:none;
}

/* ── CURSOR SPHERE ── */
#cursor-sphere{
  position:fixed;width:18px;height:18px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff 0%,#00e5ff 45%,#8b00ff 100%);
  box-shadow:0 0 16px #00e5ff,0 0 32px #8b00ff,0 0 60px rgba(139,0,255,0.4);
  transform:translate(-50%,-50%);pointer-events:none;z-index:9999;
  mix-blend-mode:screen;transition:transform 0.15s ease;will-change:left,top;
}

/* ── PAGE TRANSITION ── */
#page-transition{
  position:fixed;inset:0;background:#000;z-index:99999;
  transform:translateX(-100%);pointer-events:none;
}

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;
  padding:28px 56px;display:flex;justify-content:space-between;align-items:center;
  z-index:1000;transition:background 0.5s ease,backdrop-filter 0.5s ease;
}
#nav.scrolled{
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.nav-logo{
  font-family:'Playfair Display',Georgia,serif;font-size:20px;color:#fff;
  text-decoration:none;letter-spacing:0.12em;font-weight:700;
}
.nav-links{
  display:flex;gap:48px;list-style:none;align-items:center;
}
.nav-link{
  font-size:10px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(255,255,255,0.65);text-decoration:none;
  transition:color 0.3s;position:relative;display:inline-block;
}
.nav-link::after{
  content:'';position:absolute;bottom:-5px;left:0;
  width:0;height:1px;
  background:linear-gradient(90deg,#8b00ff,#00e5ff);
  transition:width 0.35s ease;
}
.nav-link:hover{color:#fff}
.nav-link:hover::after{width:100%}

/* ── HERO ── */
#hero{

}
.hero-content{text-align:center;position:relative;z-index:2}
#hero-title{
  font-family:'Playfair Display',Georgia,serif;

  font-weight:900;color:#fff;letter-spacing:0.06em;line-height:1;

}
#hero-title .char{display:inline-block;will-change:transform}
.tagline{
  font-size:clamp(9px,1.1vw,12px);letter-spacing:0.35em;text-transform:uppercase;

}

.btn{

  background:transparent;position:relative;overflow:hidden;
  transition:border-color 0.3s,color 0.3s;will-change:transform;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(139,0,255,0.15),rgba(0,229,255,0.15));
  opacity:0;transition:opacity 0.3s;
}
.btn:hover::before{opacity:1}
.btn:hover{border-color:rgba(0,229,255,0.8);color:#00e5ff}
.btn-outline{

}
.btn-outline:hover{border-color:#00e5ff;color:#fff}

.scroll-indicator{
  position:absolute;bottom:40px;left:50%;transform:translateX(-50%);

  z-index:2;opacity:0;

.scroll-indicator span{

  width:1px;height:56px;

@keyframes scrollPulse{
  0%{transform:scaleY(0);transform-origin:top;opacity:1}
  50%{transform:scaleY(1);transform-origin:top;opacity:1}
  100%{transform:scaleY(1);transform-origin:bottom;opacity:0}

.card-vertical{

.card-name{

.card-view{

}
.card-view::after{content:'→';transition:transform 0.3s}
.project-card:hover .card-view{opacity:1;transform:translateY(0)}
.project-card:hover .card-view:hover::after{transform:translateX(4px)}

/* Decorative lines in card mock */
.mock-line{
  height:1px;background:rgba(255,255,255,0.07);margin-bottom:10px;
}
.mock-block{
  border-radius:2px;background:rgba(255,255,255,0.05);
  margin-bottom:8px;
}

/* ── STATEMENT SECTION ── */
#statement{
  position:relative;min-height:100vh;display:flex;align-items:center;
  z-index:1;overflow:hidden;
}
#vortex-canvas{
  position:absolute;inset:0;width:100%;height:100%;

.statement-content{

.counter-label{

.editorial-text{

.editorial-text em{

/* ── MOBILE ── */
@media(max-width:768px){
  #nav{padding:20px 24px}

  #cursor-sphere,#cursor-canvas{display:none}
  body{cursor:auto}a{cursor:auto}
}

<script>
/* =========================================================
   GLOBALS
   ========================================================= */
gsap.registerPlugin(ScrollTrigger);
const isMobile = window.innerWidth <= 768;
const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
let smoothMouse = { x: mouse.x, y: mouse.y };
let lenisRef = null;

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

/* =========================================================
   LENIS
   ========================================================= */
const lenis = new Lenis({ lerp: 0.08, wheelMultiplier: 0.85, smoothTouch: false });
lenisRef = lenis;
lenis.on('scroll', ScrollTrigger.update);
gsap.ticker.add(t => lenis.raf(t * 1000));
gsap.ticker.lagSmoothing(0);

/* =========================================================
   CURSOR SPHERE
   ========================================================= */
const sphere = document.getElementById('cursor-sphere');
let cx = mouse.x, cy = mouse.y;
(function tickCursor() {
  cx += (mouse.x - cx) * 0.13;
  cy += (mouse.y - cy) * 0.13;
  sphere.style.left = cx + 'px';
  sphere.style.top  = cy + 'px';
  requestAnimationFrame(tickCursor);
})();
document.querySelectorAll('a,.project-card,[data-magnetic]').forEach(el => {
  el.addEventListener('mouseenter', () => gsap.to(sphere, { scale: 2.8, duration: 0.3, ease: 'power2.out' }));
  el.addEventListener('mouseleave', () => gsap.to(sphere, { scale: 1,   duration: 0.4, ease: 'elastic.out(1,0.5)' }));
});

/* =========================================================
   MAIN THREE.JS SCENE — Nebula + Organic Mesh + Bloom
   ========================================================= */
(function initMainScene() {
  if (isMobile) return;
  const canvas   = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: false, antialias: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.z = 5;

  /* -- NEBULA PLANE -- */
  const nebMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:  { value: 0 },
      uMouse: { value: new THREE.Vector2(0, 0) },
    },
    vertexShader: `
      varying vec2 vUv;
      void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec2  uMouse;
      varying vec2  vUv;

      float h(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+74.27);return fract(p.x*p.y);}
      float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
        return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
      float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<7;i++){v+=a*n(p);p=p*2.1+vec2(1.7,9.2);a*=.5;}return v;}

      void main(){
        vec2 uv=vUv+uMouse*0.025;
        vec2 q=vec2(fbm(uv*2.+uTime*.04),fbm(uv*2.+vec2(5.2,1.3)+uTime*.035));
        vec2 r=vec2(fbm(uv*2.+2.*q+vec2(1.7,9.2)+uTime*.025),
                    fbm(uv*2.+2.*q+vec2(8.3,2.8)+uTime*.02));
        float f=fbm(uv*2.+2.5*r);

        vec3 c=mix(vec3(0),vec3(.18,0.,.48),clamp(f*2.,0.,1.));
        c=mix(c,vec3(.45,0.,.9),clamp(f*f*3.,0.,1.));
        c=mix(c,vec3(0.,.65,.95),clamp(length(q)*.9,0.,1.));

        // Orbs
        float o1=exp(-9.*length(vUv-vec2(.28,.62)+uMouse*.04));
        float o2=exp(-11.*length(vUv-vec2(.72,.31)+uMouse*.03));
        float o3=exp(-7.*length(vUv-vec2(.82,.71)+uMouse*.02));
        c+=o1*vec3(.55,0.,1.)*.9;
        c+=o2*vec3(0.,.75,.95)*.9;
        c+=o3*vec3(.4,0.,.8)*(.5+.5*sin(uTime*.7));

        c=pow(clamp(c,0.,1.),vec3(.9))*.55;
        gl_FragColor=vec4(c,1.);
      }
    `,
    depthWrite: false,
  });
  const nebMesh = new THREE.Mesh(new THREE.PlaneGeometry(20, 12), nebMat);
  nebMesh.position.z = -4;
  scene.add(nebMesh);

  /* -- ORGANIC MESH -- */
  const meshMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:  { value: 0 },
      uAlpha: { value: 1 },
    },
    vertexShader: `
      uniform float uTime;
      varying vec3 vN;
      varying float vD;

      float hn(vec3 p){p=fract(p*vec3(443.9,397.3,491.2));p+=dot(p,p.yxz+19.2);return fract((p.x+p.y)*p.z);}
      float nn(vec3 p){vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
        return mix(
          mix(mix(hn(i),hn(i+vec3(1,0,0)),f.x),mix(hn(i+vec3(0,1,0)),hn(i+vec3(1,1,0)),f.x),f.y),
          mix(mix(hn(i+vec3(0,0,1)),hn(i+vec3(1,0,1)),f.x),mix(hn(i+vec3(0,1,1)),hn(i+vec3(1,1,1)),f.x),f.y),f.z);}
      float fbm3(vec3 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*nn(p);p=p*2.1+vec3(1.7,9.2,3.1);a*=.5;}return v;}

      void main(){
        vN=normal;
        float d=fbm3((position+uTime*.12)*1.4)*.52;
        vD=d;
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position+normal*d,1.);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform float uAlpha;
      varying vec3 vN;
      varying float vD;
      void main(){
        float rim=pow(1.-max(dot(normalize(vN),vec3(0,0,1)),0.),2.8);
        vec3 base=vec3(.07,.04,.1);
        vec3 hi=mix(vec3(.42,0.,.85),vec3(0.,.72,.95),vD*2.);
        vec3 rimCol=mix(vec3(.5,0.,1.),vec3(0.,.8,1.),sin(uTime*.45)*.5+.5);
        vec3 col=base+hi*.28+rim*rimCol*.75;
        gl_FragColor=vec4(col,uAlpha);
      }
    `,
    transparent: true,
  });
  const orgMesh = new THREE.Mesh(new THREE.SphereGeometry(1.6, 96, 96), meshMat);
  scene.add(orgMesh);

  /* -- BLOOM -- */
  let composer = null;
  try {
    composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));
    const bloom = new THREE.UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight), 1.4, 0.5, 0.1);
    composer.addPass(bloom);
  } catch(e) { composer = null; }

  /* -- SCROLL FADE MESH -- */
  ScrollTrigger.create({
    trigger: '#hero', start: 'top top', end: 'bottom top',
    onUpdate: self => {
      meshMat.uniforms.uAlpha.value = 1 - self.progress * 1.8;
      orgMesh.visible = self.progress < 0.7;
    }
  });

  /* -- RESIZE -- */
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    if (composer) composer.setSize(window.innerWidth, window.innerHeight);
  });

  /* -- LOOP -- */
  let t = 0;
  (function loop() {
    requestAnimationFrame(loop);
    t += 0.01;
    nebMat.uniforms.uTime.value = t;
    nebMat.uniforms.uMouse.value.set(
      (mouse.x / window.innerWidth  - .5) * 2,
      -(mouse.y / window.innerHeight - .5) * 2
    );
    meshMat.uniforms.uTime.value = t;
    const tx = (mouse.y / window.innerHeight - .5) * .55;
    const ty = (mouse.x / window.innerWidth  - .5) * .9;
    orgMesh.rotation.x += (tx - orgMesh.rotation.x) * .05;
    orgMesh.rotation.y += (ty + t * .09 - orgMesh.rotation.y) * .05;
    if (composer) composer.render(); else renderer.render(scene, camera);
  })();
})();

/* =========================================================
   CURSOR TRAIL — Three.js TubeGeometry on overlay canvas
   ========================================================= */
(function initTrail() {
  if (isMobile) return;
  const canvas   = document.getElementById('cursor-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setClearColor(0x000000, 0);

  const scene  = new THREE.Scene();
  const W = window.innerWidth, H = window.innerHeight;
  const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, .1, 100);
  camera.position.z = 10;

  const LEN = 52;
  const hist = Array.from({ length: LEN }, () => new THREE.Vector3(0, -9999, 0));
  let idx = 0;

  function toWorld(x, y) {
    return new THREE.Vector3(x - W/2, -(y - H/2), 0);
  }

  window.addEventListener('mousemove', e => {
    hist[idx % LEN] = toWorld(e.clientX, e.clientY);
    idx++;
  });

  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float aP;
      varying float vP;
      varying vec2  vUv2;
      void main(){ vP=aP; vUv2=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }
    `,
    fragmentShader: `
      uniform float uTime;
      varying float vP;
      varying vec2  vUv2;
      void main(){
        vec3 purple=vec3(.55,0.,1.);
        vec3 cyan=vec3(0.,.9,1.);
        vec3 col=mix(purple,cyan,vP);
        float a=vP*(1.-vP*.2)*.9;
        float rf=pow(1.-abs(vUv2.y*2.-1.),.6);
        gl_FragColor=vec4(col,a*rf);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  let tube = null;
  let tt = 0;

  (function loop() {
    requestAnimationFrame(loop);
    tt += 0.016;
    mat.uniforms.uTime.value = tt;

    if (tube) { scene.remove(tube); tube.geometry.dispose(); tube = null; }

    const pts = [];
    for (let i = 0; i < LEN; i++) {
      const j = (idx - LEN + i + LEN * 2) % LEN;
      pts.push(hist[j]);
    }

    let moving = false;
    for (let i = 1; i < pts.length; i++) {
      if (pts[i].distanceTo(pts[i-1]) > 1.5) { moving = true; break; }
    }

    if (moving) {
      try {
        const curve = new THREE.CatmullRomCurve3(pts);
        const geo   = new THREE.TubeGeometry(curve, 52, 2.8, 6, false);
        const cnt   = geo.attributes.position.count;
        const prog  = new Float32Array(cnt);
        for (let i = 0; i < cnt; i++) prog[i] = i / cnt;
        geo.setAttribute('aP', new THREE.BufferAttribute(prog, 1));
        tube = new THREE.Mesh(geo, mat);
        scene.add(tube);
      } catch(e) {}
    }

    renderer.render(scene, camera);
  })();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.left = -window.innerWidth/2; camera.right = window.innerWidth/2;
    camera.top  = window.innerHeight/2; camera.bottom = -window.innerHeight/2;
    camera.updateProjectionMatrix();
  });
})();

   ========================================================= */
function attachMagnetic(el, strength) {
  strength = strength || 42;
  el.addEventListener('mousemove', e => {
    const r  = el.getBoundingClientRect();
    const dx = (e.clientX - r.left - r.width  / 2) / r.width;
    const dy = (e.clientY - r.top  - r.height / 2) / r.height;
    gsap.to(el, { x: dx * strength, y: dy * strength, duration: .4, ease: 'power2.out' });
  });
  el.addEventListener('mouseleave', () => {
    gsap.to(el, { x: 0, y: 0, duration: .7, ease: 'elastic.out(1,.4)' });
  });
}
document.querySelectorAll('[data-magnetic]').forEach(el => attachMagnetic(el));
document.querySelectorAll('.nav-link').forEach(el => attachMagnetic(el, 8));

/* =========================================================
   PARTICLE BURST
   ========================================================= */
function burst(x, y) {
  const cols = ['#8b00ff','#00e5ff','#ff00cc','#ffffff','#6600ff'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    const s = 3 + Math.random() * 4;
    p.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${s}px;height:${s}px;
      border-radius:50%;background:${cols[Math.floor(Math.random()*cols.length)]};
      pointer-events:none;z-index:9997;`;
    document.body.appendChild(p);
    const ang = Math.random() * Math.PI * 2;
    const dst = 60 + Math.random() * 120;
    anime({
      targets: p,
      left: x + Math.cos(ang) * dst,
      top:  y + Math.sin(ang) * dst,
      opacity: [1, 0], scale: [1, 0],
      duration: 500 + Math.random() * 400,
      easing: 'easeOutExpo',
      complete: () => p.remove()
    });
  }
}
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('mouseenter', e => burst(e.clientX, e.clientY));
});

  const tl = gsap.timeline({ delay: .5 });
  tl.to(chars, { opacity: 1, y: 0, duration: .9, stagger: .055, ease: 'power3.out' })

/* =========================================================
   VORTEX HELIX — Statement Section
   ========================================================= */
(function initVortex() {
  const canvas = document.getElementById('vortex-canvas');
  if (!canvas) return;
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
  renderer.setClearColor(0x000000, 0);

  function resize() {
    renderer.setSize(canvas.offsetWidth || window.innerWidth, canvas.offsetHeight || window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    camera.aspect = (canvas.offsetWidth || window.innerWidth) / (canvas.offsetHeight || window.innerHeight);
    camera.updateProjectionMatrix();
  }

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, 1, .1, 1000);
  camera.position.z = 9;
  resize();

  const turns = 6, ppt = 120;
  const pts = [];
  for (let i = 0; i <= turns * ppt; i++) {
    const t = i / ppt;
    pts.push(new THREE.Vector3(Math.cos(t * Math.PI * 2) * 3, Math.sin(t * Math.PI * 2) * 3, (t - turns / 2) * .9));
  }
  const curve = new THREE.CatmullRomCurve3(pts);

  const vMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `attribute float aP; varying float vP;
      void main(){ vP=aP; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
    fragmentShader: `uniform float uTime; varying float vP;
      void main(){
        vec3 p=vec3(.52,0.,1.),c=vec3(0.,.88,1.);
        vec3 col=mix(p,c,fract(vP+uTime*.12));
        float a=.6+.35*sin(vP*6.28+uTime*.9);
        gl_FragColor=vec4(col,a);
      }`,
    transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.DoubleSide
  });

  const geo  = new THREE.TubeGeometry(curve, turns * ppt, .035, 8, false);
  const cnt  = geo.attributes.position.count;
  const prog = new Float32Array(cnt);
  for (let i = 0; i < cnt; i++) prog[i] = i / cnt;
  geo.setAttribute('aP', new THREE.BufferAttribute(prog, 1));
  const helix = new THREE.Mesh(geo, vMat);
  scene.add(helix);

  let vt = 0, scrollSpd = 0, lastSY = 0;
  if (lenisRef) lenisRef.on('scroll', ({ scroll }) => {
    scrollSpd = Math.abs(scroll - lastSY);
    lastSY = scroll;
  });

  (function loop() {
    requestAnimationFrame(loop);
    vt += 0.007 + scrollSpd * 0.0015;
    scrollSpd *= 0.88;
    helix.rotation.z = vt * .6;
    helix.rotation.x = vt * .15;
    vMat.uniforms.uTime.value = vt;
    renderer.render(scene, camera);
  })();

  new ResizeObserver(resize).observe(canvas.parentElement || canvas);
})();
