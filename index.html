<script>
gsap.registerPlugin(ScrollTrigger);

/* ── LENIS ── */
let lenis=null;
try{
  lenis=new Lenis({lerp:.08,wheelMultiplier:.85,smoothTouch:false});
  lenis.on('scroll',ScrollTrigger.update);
  gsap.ticker.add(t=>lenis.raf(t*1000));
  gsap.ticker.lagSmoothing(0);
}catch(e){console.warn('[V] Lenis:',e.message)}

/* ── MOUSE ── */
const mouse={x:-9999,y:-9999};
window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});

/* ══════════════════════════════════════════════════════
   COSMIC NEBULA SYSTEM

   Two visual layers on one canvas:
   1. Gas blobs — large radial-gradient spheres drawn in
      'screen' composite mode so overlapping purple + cyan
      blends toward white-violet, simulating nebula cores.
   2. Star particles — tiny points following a flow field
      made from summed sinusoids ("fake Perlin noise").
      Mouse proximity gently pushes them away.
══════════════════════════════════════════════════════ */

/* Nebula color palette */
const NC=[
  [124, 58,237],   // deep purple
  [167,139,250],   // soft violet
  [139, 92,246],   // medium violet
  [192,132,252],   // light purple
  [  6,182,212],   // cyan
  [ 34,211,238],   // light cyan
  [236, 72,153],   // hot pink
  [217, 70,239],   // fuchsia
];

/* Flow field — multi-octave sinusoidal "fake Perlin" */
function flowAngle(x,y,t){
  return(
    Math.sin(x*.0042+t*.28)*2.2+
    Math.cos(y*.0035-x*.0022+t*.22)*1.5+
    Math.sin((x+y)*.0028+t*.17)*.9+
    Math.cos(x*.0018-y*.0030-t*.12)*.6
  );
}

(function initNebula(){
  const c=document.getElementById('nebula-canvas');
  const ctx=c.getContext('2d');
  const TAU=Math.PI*2;
  let W,H,blobs=[],stars=[];

  function resize(){
    W=c.width=window.innerWidth;
    H=c.height=window.innerHeight;
    build();
  }

  function build(){
    /* Gas blobs — large soft spheres, very low alpha */
    blobs=Array.from({length:62},()=>({
      x:Math.random()*W, y:Math.random()*H,
      r:70+Math.random()*140,
      cIdx:Math.floor(Math.random()*NC.length),
      ph:Math.random()*TAU,
      vx:(Math.random()-.5)*.06,
      vy:(Math.random()-.5)*.05,
    }));

    /* Star particles — tiny, flowing */
    stars=Array.from({length:1800},()=>({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4,
      r:.4+Math.random()*1.8,
      cIdx:Math.floor(Math.random()*NC.length),
      ph:Math.random()*TAU,
      ba:.12+Math.random()*.55,
      spd:.5+Math.random()*.9,
    }));
  }

  resize(); window.addEventListener('resize',resize);

  const REPEL=110, REPEL_STR=3.8;
  let t=0;

  (function loop(){
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,W,H);
    t+=.008;

    /* ── Pass 1: Gas blobs in 'screen' blend ──
       screen blend: result = 1-(1-A)(1-B)
       Overlapping purple+cyan merges toward bright white-violet,
       exactly like a real emission nebula. */
    ctx.globalCompositeOperation='screen';
    blobs.forEach(b=>{
      b.x=(b.x+b.vx+W)%W; b.y=(b.y+b.vy+H)%H;
      const alpha=.028+.016*Math.sin(t*.32+b.ph);
      const [rv,gv,bv]=NC[b.cIdx];
      const grd=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      grd.addColorStop(0,`rgba(${rv},${gv},${bv},${alpha.toFixed(3)})`);
      grd.addColorStop(.55,`rgba(${rv},${gv},${bv},${(alpha*.35).toFixed(3)})`);
      grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,TAU); ctx.fill();
    });
    ctx.globalCompositeOperation='source-over';

    /* ── Pass 2: Star particles following flow field ── */
    stars.forEach(p=>{
      /* Flow field velocity nudge */
      const ang=flowAngle(p.x,p.y,t);
      p.vx+=Math.cos(ang)*p.spd*.016;
      p.vy+=Math.sin(ang)*p.spd*.016;
      /* Mouse repulsion — gentle drift away */
      const dx=p.x-mouse.x, dy=p.y-mouse.y, d2=dx*dx+dy*dy;
      if(d2<REPEL*REPEL&&d2>.01){
        const d=Math.sqrt(d2),f=(REPEL-d)/REPEL;
        p.vx+=(dx/d)*f*REPEL_STR*.12;
        p.vy+=(dy/d)*f*REPEL_STR*.12;
      }
      p.vx*=.95; p.vy*=.95;
      p.x=(p.x+p.vx+W)%W; p.y=(p.y+p.vy+H)%H;

      const tw=p.ba*(.55+.45*Math.sin(t*1.4+p.ph));
      const [rv,gv,bv]=NC[p.cIdx];

      /* Soft glow halo */
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*5.5,0,TAU);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${(tw*.022).toFixed(3)})`; ctx.fill();
      /* Bright core */
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,TAU);
      ctx.fillStyle=`rgba(${rv},${gv},${bv},${Math.min(tw,.96).toFixed(3)})`; ctx.fill();
    });
  })();
})();

/* ══ CURSOR STARDUST ══ */
(function initCursorTrail(){
  const c=document.getElementById('cursor-canvas');
  const ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize(); window.addEventListener('resize',resize);
  const pool=[];
  let lx=-9999,ly=-9999;
  window.addEventListener('mousemove',e=>{
    if(Math.hypot(e.clientX-lx,e.clientY-ly)<4)return;
    lx=e.clientX;ly=e.clientY;
    for(let i=0;i<2+(Math.random()<.36?1:0);i++){
      const ang=Math.random()*Math.PI*2,spd=.32+Math.random()*.88;
      pool.push({x:lx,y:ly,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-.22,life:1,dec:1/(42+Math.random()*18),sz:2+Math.random()*2.2,rot:Math.random()*Math.PI,hue:260+Math.random()*80});
    }
  });
  function drawSparkle(x,y,sz,rot,alpha,hue){
    ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.globalAlpha=alpha;ctx.fillStyle=`hsl(${hue},100%,88%)`;
    ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(sz*.13,0);ctx.lineTo(0,sz);ctx.lineTo(-sz*.13,0);ctx.closePath();ctx.fill();
    ctx.rotate(Math.PI*.5);
    ctx.beginPath();ctx.moveTo(0,-sz*.55);ctx.lineTo(sz*.085,0);ctx.lineTo(0,sz*.55);ctx.lineTo(-sz*.085,0);ctx.closePath();ctx.fill();
    ctx.restore();
  }
  (function loop(){
    requestAnimationFrame(loop);ctx.clearRect(0,0,c.width,c.height);
    for(let i=pool.length-1;i>=0;i--){
      const s=pool[i];
      s.x+=s.vx;s.y+=s.vy;s.vx*=.97;s.vy*=.97;s.life-=s.dec;s.rot+=.042;
      if(s.life<=0){pool.splice(i,1);continue}
      drawSparkle(s.x,s.y,s.sz,s.rot,s.life*s.life,s.hue);
    }
  })();
})();

/* ══ BOOK INTRO ══ */
(function initBookIntro(){
  gsap.set('#book-left', {transformOrigin:'right center',rotationY:0});
  gsap.set('#book-right',{transformOrigin:'left center', rotationY:0});
  gsap.set('#book-logo', {opacity:1});
  gsap.timeline({delay:1.5})
    .to('#book-logo', {opacity:0,duration:.40,ease:'power2.in'})
    .to('#book-left', {rotationY:-108,y:10,duration:1.2,ease:'power2.inOut'},'-=0.15')
    .to('#book-right',{rotationY: 108,y:10,duration:1.2,ease:'power2.inOut'},'<')
    .to('#book-intro',{opacity:0,duration:.35,pointerEvents:'none',
      onComplete(){document.getElementById('book-intro').style.display='none'}
    },'-=0.25')
    .call(startHeroReveal);
})();

/* ══ HERO REVEAL ══ */
gsap.set(['#hero-text','#hero-ctas','.scroll-indicator'],{opacity:0});

function startHeroReveal(){
  gsap.timeline({delay:.12})
    .to('#hero-text',       {opacity:1,y:0,duration:1.3,ease:'power3.out'})
    .to('#hero-ctas',       {opacity:1,    duration:.9, ease:'power2.out'},'-=.4')
    .to('.scroll-indicator',{opacity:1,    duration:.8, ease:'power2.out'},'-=.3');
}

/* ══ EASTER EGG ══ */
(function initEasterEgg(){
  const btn=document.getElementById('easter-egg');
  const modal=document.getElementById('ee-modal');
  const close=document.getElementById('ee-close');
  btn.addEventListener('click',()=>modal.classList.add('open'));
  close.addEventListener('click',()=>modal.classList.remove('open'));
  modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open')});
})();

/* ══ NAV ══ */
window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('scrolled',window.scrollY>60);
},{passive:true});

/* ══ PAGE TRANSITIONS ══ */
gsap.set('#page-transition',{x:'100%'});
document.querySelectorAll('a[href]').forEach(a=>{
  const hr=a.getAttribute('href');
  if(!hr||hr.startsWith('#')||hr.startsWith('mailto')||hr.startsWith('tel')||hr.startsWith('http'))return;
  a.addEventListener('click',e=>{
    e.preventDefault();
    gsap.fromTo('#page-transition',{x:'100%'},{x:'0%',duration:.5,ease:'power3.inOut',onComplete:()=>window.location.href=hr});
  });
});
window.addEventListener('load',()=>{
  gsap.fromTo('#page-transition',{x:'0%'},{x:'-100%',duration:.6,delay:.1,ease:'power3.inOut'});
});
</script>
